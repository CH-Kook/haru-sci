/* ============================================================
   하루과학 디자인 토큰
   콘셉트: 모눈종이 실험 노트 + 빨간펜 채점
   ============================================================ */
:root{
  --paper:#FAF6EE;        /* 따뜻한 크림 노트 캔버스 */
  --grid:rgba(150,120,86,0.07);   /* 따뜻한 갈색 모눈선 */
  --ink:#2B2823;          /* 따뜻한 잉크(차콜 브라운) */
  --ink-soft:#6C6459;
  --ink-faint:#A89F90;
  --line:#E8E0D2;         /* 따뜻한 헤어라인 */
  --redpen:#CB4A3B;       /* 채점 빨간펜 */
  --redpen-soft:#F7E7E1;
  --bluepen:#2F6D8C;      /* 파란펜(청록빛) */
  --bluepen-soft:#E7F0F2;
  --card:#FFFCF6;         /* 따뜻한 카드 */
  --shadow:0 1px 2px rgba(70,52,32,.05), 0 8px 22px rgba(70,52,32,.06);
  --r:14px;
  /* Claude 코랄 계열 강조 */
  --coral:#CC785C; --coral-active:#A9583E; --coral-soft:#F3E4DB;
  --cream-card:#F1E9DB;   /* 코지한 크림 블록 */
  --good:#4E9A63; --good-soft:#E7F1E7;   /* 정답 공개(성공) */
  --serif:'Noto Serif KR',Georgia,'Apple SD Gothic Neo','Laundry Gothic',serif;
  /* 영역 색 (크림 위에서 조화되도록 살짝 warm) */
  --d-space:#6E5FBE; --d-life:#4B9A63; --d-matter:#C0762C;
  --d-physics:#39749E; --d-earth:#45949F; --d-think:#94569F;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Laundry Gothic',-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  color:var(--ink);
  background:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px),
    var(--paper);
  background-size:22px 22px, 22px 22px, auto;
  font-size:17px;
  line-height:1.62;
  word-break:keep-all;
  overflow-wrap:break-word;
}
.mono{font-family:'IBM Plex Mono',monospace}

/* ---------- 앱 프레임 ---------- */
#app{
  max-width:430px;margin:0 auto;min-height:100dvh;
  display:flex;flex-direction:column;position:relative;
  background:transparent;
}
#screen{flex:1;padding:20px 18px 96px;overflow-x:hidden}

/* ---------- 공통 요소 ---------- */
.eyebrow{
  font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;
  letter-spacing:.14em;color:var(--ink-faint);text-transform:uppercase;
}
h1.screen-title{font-family:var(--serif);font-size:26px;font-weight:700;letter-spacing:-.01em;margin:2px 0 18px}
.card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  box-shadow:var(--shadow);padding:18px;
}
.btn{
  display:block;width:100%;border:none;border-radius:12px;cursor:pointer;
  font-family:inherit;font-size:16px;font-weight:600;padding:15px;
  transition:transform .06s ease, background .15s ease;
}
.btn:active{transform:scale(.985)}
.btn-primary{background:var(--coral);color:#fff}
.btn-primary:active{background:var(--coral-active)}
.btn-primary:disabled{background:var(--ink-faint);cursor:default}
.btn-ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--line)}
.btn-red{background:var(--redpen);color:#fff}
.chip{
  display:inline-flex;align-items:center;gap:5px;border-radius:99px;
  font-size:12px;font-weight:600;padding:3px 10px;
}

/* ---------- 홈 ---------- */
.streak-row{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
.streak-num{font-family:'IBM Plex Mono',monospace;font-size:44px;font-weight:600;color:var(--redpen);line-height:1}
.streak-label{font-size:14px;color:var(--ink-soft);font-weight:500}
.today-card{margin-top:16px}
.today-topic{margin:10px 0 16px}
.today-topic-domain{font-size:12.5px;font-weight:700;letter-spacing:.02em}
.today-topic-title{font-family:var(--serif);font-size:19px;font-weight:700;margin:4px 0 6px;line-height:1.35}
.today-topic-chapter{font-family:'IBM Plex Mono',monospace;font-size:13.5px;color:var(--ink-faint)}
.domain-list{margin-top:22px;display:flex;flex-direction:column;gap:10px}
.domain-row{
  display:flex;align-items:center;gap:12px;background:var(--card);
  border:1px solid var(--line);border-radius:12px;padding:12px 14px;cursor:pointer;
}
.domain-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.domain-name{font-weight:600;font-size:16px;flex:1}
.domain-next{font-size:13.5px;color:var(--ink-soft);margin-top:3px}
.domain-prog{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-faint)}
.progress-bar{height:4px;background:var(--paper);border-radius:2px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:2px;transition:width .4s ease}

/* ---------- 탐색 ---------- */
.unit-group{margin-bottom:22px}
.unit-group h3{font-size:15px;font-weight:700;margin:0 0 8px;display:flex;align-items:center;gap:8px}
.unit-item{
  position:relative;
  display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--card);
  border:1px solid var(--line);border-radius:12px;margin-bottom:8px;cursor:pointer;
}
.unit-item.locked{opacity:.5;cursor:default}
.unit-item .u-name{flex:1;font-size:15px;font-weight:500}
.unit-item .u-count{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-faint)}
.topic-stamp{
  position:absolute;top:50%;right:14px;transform:translateY(-50%) rotate(-14deg);
  width:58px;height:58px;border-radius:50%;flex-shrink:0;
  border:3px solid var(--redpen);box-shadow:0 0 0 3px rgba(203,74,59,.15) inset;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-weight:800;font-size:21px;color:var(--redpen);
  background:rgba(203,74,59,.05);letter-spacing:.02em;pointer-events:none;
}
.badge-ready{background:var(--coral-soft);color:var(--coral-active)}
.badge-soon{background:var(--paper);color:var(--ink-faint);border:1px solid var(--line)}

/* ---------- 이야기: 과목별 접기/펼치기 ---------- */
.story-domain{border:1px solid var(--line);border-radius:12px;background:var(--card);margin-bottom:10px;overflow:hidden}
.story-domain summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:8px;padding:14px}
.story-domain summary::-webkit-details-marker{display:none}
.story-domain summary::after{content:'▾';margin-left:2px;color:var(--ink-faint);font-size:12px;transition:transform .15s ease}
.story-domain[open] summary::after{transform:rotate(180deg)}
.story-domain .story-domain-body{padding:0 12px 12px}

/* ---------- 확인 팝업(넛지) ---------- */
.confirm-overlay{
  position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;
  background:rgba(43,40,35,.32);backdrop-filter:blur(2px);padding:20px;
}
.confirm-overlay.show{display:flex}
.confirm-card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  box-shadow:var(--shadow);max-width:340px;width:100%;padding:20px 20px 16px;
}
.confirm-card h3{font-family:var(--serif);font-size:17px;font-weight:700;margin:0 0 8px}
.confirm-card p{font-size:13.5px;color:var(--ink-soft);line-height:1.55;margin:0 0 18px}
.confirm-card .confirm-actions{display:flex;gap:8px}
.confirm-card .confirm-actions .btn{padding:12px;font-size:14px}

/* ---------- 세션 (풀스크린) ---------- */
#session{
  position:fixed;inset:0;z-index:50;display:none;flex-direction:column;
  max-width:430px;margin:0 auto;
  background:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px),
    var(--paper);
  background-size:22px 22px, 22px 22px, auto;
}
#session.open{display:flex}
.sess-top{display:flex;align-items:center;gap:12px;padding:16px 18px 8px}
.sess-close{background:none;border:none;font-size:22px;color:var(--ink-faint);cursor:pointer;padding:4px;line-height:1}
.sess-track{flex:1;height:6px;background:#E7EAF0;border-radius:3px;overflow:hidden}
.sess-track i{display:block;height:100%;background:var(--bluepen);border-radius:3px;transition:width .3s ease}
.sess-body{flex:1;overflow-y:auto;padding:14px 18px 24px;display:flex;flex-direction:column}
.sess-foot{padding:12px 18px calc(16px + env(safe-area-inset-bottom))}

/* 개념 카드 */
.concept-tag{margin-bottom:10px}
.concept-card{position:relative}
.concept-card h2{font-family:var(--serif);font-size:23px;font-weight:700;letter-spacing:-.005em;margin-bottom:12px}
.concept-card h2::after{content:"";display:block;width:38px;height:3px;background:var(--coral);border-radius:2px;margin-top:9px;opacity:.85}
.concept-card p{font-size:18.5px;line-height:1.8;color:var(--ink)}
.figure{
  margin:14px 0 4px;background:var(--paper);border:1px solid var(--line);
  border-radius:10px;padding:14px;text-align:center;
}
.figure svg{max-width:100%;height:auto}
.figure figcaption{font-size:14.5px;color:var(--ink-soft);margin-top:8px;line-height:1.5}
.q-figure{margin:0 0 16px}
.concept-card .example{
  margin-top:14px;padding:12px 14px;background:var(--cream-card);
  border-left:3px solid var(--coral);border-radius:0 10px 10px 0;
  font-size:15px;color:var(--ink);
}
.concept-card .example b{color:var(--coral-active)}

/* 문제 */
.q-text{font-size:21px;font-weight:600;line-height:1.6;margin-bottom:18px}
.q-text u{text-decoration-line:underline;text-decoration-color:var(--redpen);text-decoration-thickness:2.5px;text-underline-offset:3px}
.collect-stamp{
  display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;
  font-family:var(--serif);font-size:10.5px;font-weight:700;color:var(--redpen);
  border:1.5px solid var(--redpen);border-radius:6px;padding:2px 7px;
  transform:rotate(-7deg);letter-spacing:.03em;background:rgba(203,74,59,.06);
}
.q-level{margin-bottom:10px}
.choice{
  display:block;width:100%;text-align:left;background:var(--card);
  border:1.5px solid var(--line);border-radius:12px;padding:14px 16px;
  font-family:inherit;font-size:18px;font-weight:500;color:var(--ink);
  margin-bottom:10px;cursor:pointer;transition:border-color .12s;
}
.choice:not(:disabled):hover{border-color:var(--ink-faint)}
.choice.picked-right{border-color:var(--redpen);background:#fff}
.choice.picked-wrong{border-color:var(--redpen);background:var(--redpen-soft)}
.choice.reveal-answer{border-color:var(--good);background:var(--good-soft)}
.choice:disabled{cursor:default}
.choice.unknown-choice{
  border-style:dashed;color:var(--ink-faint);font-weight:600;text-align:center;
}
.choice.unknown-choice.picked-unknown{border-color:var(--ink-faint);background:var(--paper)}
.ox-wrap{display:flex;gap:12px}
.ox-wrap .choice{flex:1;text-align:center;font-size:26px;font-weight:700;padding:22px 0}
.ox-wrap.with-unknown{flex-wrap:wrap}
.ox-wrap.with-unknown .choice.unknown-choice{flex-basis:100%;font-size:15px;padding:12px 0}

/* 빨간펜 채점 마크 — 시그니처 */
.grade-wrap{position:relative}
.grade-mark{
  position:absolute;left:0;right:0;top:0;display:flex;justify-content:center;
  pointer-events:none;z-index:5;
}
.grade-mark svg{width:130px;height:130px;overflow:visible}
.grade-mark path, .grade-mark circle{
  fill:none;stroke:var(--redpen);stroke-width:7;stroke-linecap:round;
  filter:drop-shadow(0 1px 1px rgba(214,69,61,.25));
}
/* 동그라미는 손으로 두 번 겹쳐 그린 것처럼 삐뚤빼뚤한 획 2겹 + 거친 질감 필터로 색연필 느낌을 낸다 */
.grade-mark path.draw-o{
  stroke-dasharray:480;stroke-dashoffset:480;animation:draw .5s ease-out forwards;
  filter:url(#pencilTex) drop-shadow(0 1px 1px rgba(214,69,61,.25));
}
.grade-mark path.draw-o2{
  stroke-dasharray:460;stroke-dashoffset:460;stroke-width:4.5;opacity:.6;
  animation:draw .45s ease-out .12s both;
  filter:url(#pencilTex2) drop-shadow(0 1px 1px rgba(214,69,61,.2));
}
.draw-x{stroke-dasharray:200;stroke-dashoffset:200;animation:draw .35s ease-out forwards}
@keyframes draw{to{stroke-dashoffset:0}}
@media (prefers-reduced-motion:reduce){
  .draw-o,.draw-o2,.draw-x{animation:none;stroke-dashoffset:0}
  *{transition:none!important}
}

/* 해설 */
.explain{
  margin-top:16px;background:var(--card);border:1px dashed var(--redpen);
  border-radius:12px;padding:14px 16px;font-size:17px;line-height:1.75;
}
.explain .verdict{font-weight:700;margin-bottom:6px}
.explain .verdict.ok{color:var(--redpen)}
.explain .verdict.no{color:var(--redpen)}
.explain .verdict.unknown{color:var(--ink-faint)}
.report-btn{
  margin-top:10px;background:none;border:none;font-family:inherit;
  font-size:12px;color:var(--ink-faint);text-decoration:underline;cursor:pointer;
}
.report-btn.done{color:var(--bluepen);text-decoration:none}

/* 결과 */
.result-hero{text-align:center;padding:38px 0 26px}
.result-hero .big{font-family:'IBM Plex Mono',monospace;font-size:52px;font-weight:600;color:var(--redpen)}
.result-hero .sub{color:var(--ink-soft);font-size:14px;margin-top:6px}
.result-list{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.result-row{display:flex;justify-content:space-between;font-size:14px;padding:11px 14px;background:var(--card);border:1px solid var(--line);border-radius:10px}
.result-row b{font-family:'IBM Plex Mono',monospace}

/* ---------- 복습함 / 통계 ---------- */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.stat-cell{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px}
.stat-cell b{font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:600;display:block}
.stat-cell span{font-size:12px;color:var(--ink-soft)}
.wrong-item{
  background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:12px 14px;margin-bottom:8px;font-size:14px;
}
.wrong-item .w-due{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--redpen);margin-top:4px}
.section-label{font-size:13px;font-weight:700;color:var(--ink-soft);margin:20px 0 10px;letter-spacing:.02em}
.dev-note{font-size:12px;color:var(--ink-faint);line-height:1.6;margin-top:8px}

/* ---------- 사용법 도움말 버튼 (스크롤 시 같이 흘러가도록 absolute — fixed로 화면에 계속 붙어 있으면 학습 중 시선을 분산시킴) ---------- */
#helpBar{
  position:absolute;top:0;right:0;z-index:5;
  padding:calc(14px + env(safe-area-inset-top)) 14px 0 0;
}
#helpBar a{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:2.4px solid var(--coral);
  color:var(--coral);font-family:inherit;font-weight:700;font-size:14px;
  text-decoration:none;opacity:.6;transition:opacity .15s ease,color .15s ease,border-color .15s ease;
}
#helpBar a:active{opacity:1;color:var(--coral-active);border-color:var(--coral-active)}

/* ---------- 하단 탭 ---------- */
#tabbar{
  position:fixed;bottom:0;left:0;right:0;z-index:40;
  max-width:430px;margin:0 auto;
  display:flex;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);
  border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom);
}
#tabbar button{
  flex:1;background:none;border:none;cursor:pointer;font-family:inherit;
  padding:10px 0 8px;display:flex;flex-direction:column;align-items:center;gap:3px;
  font-size:11px;font-weight:600;color:var(--ink-faint);
}
#tabbar button.active{color:var(--ink)}
#tabbar button.active svg{stroke:var(--redpen)}
#tabbar svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.toast{
  position:fixed;left:50%;bottom:90px;transform:translateX(-50%);
  background:var(--ink);color:#fff;font-size:13px;font-weight:500;
  padding:10px 18px;border-radius:99px;z-index:99;opacity:0;transition:opacity .25s;
  pointer-events:none;white-space:nowrap;
}

<script>
/* ============================================================
   콘텐츠 데이터
   실제 운영 시 이 블록은 별도 JSON 파일로 분리하고
   파이썬 검증/빌드 스크립트를 거쳐 삽입한다.
   ============================================================ */
/* 4개 과목 영역 (2015 개정 교육과정) */
/* ============================================================
   콘텐츠는 data/ 폴더의 JSON에서 fetch로 불러온다.
   - data/index.json          : 도메인 메타 + 커리큘럼(주제 목록·태그)
   - data/topics/<id>.json     : 주제별 카드+문제 (학습 시작 시 로드)
   ============================================================ */
let DOMAINS = [];
let CURRICULUM = {};
const CARDS = {};        // 주제별 카드 (fetch로 채워짐)
const QUESTIONS = {};    // 주제별 문제 (fetch로 채워짐)

/* 수능형 전용 문제은행(양치기 전용) — 탐색 탭 커리큘럼과는 별도 저장소.
   기출 원문이 아니라 출제 경향만 참고해 100% 새로 쓴 문항만 담는다. */
const SUENUNG_BANKS = {physics:'physics-suneung', chem:'chem-suneung', bio:'bio-suneung', earth:'earth-suneung'};
const SUENUNG_TITLES = {'physics-suneung':'물리학Ⅰ 수능형', 'earth-suneung':'지구과학 수능형', 'bio-suneung':'생명과학 수능형', 'chem-suneung':'화학 수능형'};
const loadedSuenung = {};
async function ensureSuenungLoaded(subject){
  const bankId = SUENUNG_BANKS[subject];
  if(!bankId || loadedSuenung[bankId]) return bankId || null;
  try{
    const res = await fetch(`${DATA_BASE}/suneung/${subject}.json`);
    if(!res.ok) return null;
    const data = await res.json();
    CARDS[bankId] = [];
    QUESTIONS[bankId] = data.questions || [];
    loadedSuenung[bankId] = true;
    return bankId;
  }catch(e){ return null; }
}
const LEVEL_LABEL = {1:'쉬움', 2:'보통', 3:'도전'};

/* 커리큘럼 헬퍼 (CURRICULUM이 로드된 뒤 동작) */
function allTopics(did){
  if(did && did!=='all') return (CURRICULUM[did]||[]).map(t=>({...t, domain:did}));
  const out=[]; for(const d in CURRICULUM) (CURRICULUM[d]||[]).forEach(t=>out.push({...t, domain:d})); return out;
}
function allUnits(did){ return allTopics(did); }
function allTags(){
  const cnt={}; allTopics().forEach(t=>t.tags.forEach(tag=>cnt[tag]=(cnt[tag]||0)+1));
  return Object.keys(cnt).sort((a,b)=>cnt[b]-cnt[a]);
}

/* ── 콘텐츠 로더 ─────────────────────────────────────────── */
const DATA_BASE = 'data';
const loadedTopics = {};   // id -> true

async function loadIndex(){
  const res = await fetch(`${DATA_BASE}/index.json`);
  if(!res.ok) throw new Error('index '+res.status);
  const data = await res.json();
  DOMAINS = data.domains || [];
  CURRICULUM = data.curriculum || {};
}
async function loadTopic(id){
  if(loadedTopics[id]) return;
  const res = await fetch(`${DATA_BASE}/topics/${id}.json`);
  if(!res.ok) throw new Error('topic '+id+' '+res.status);
  const data = await res.json();
  CARDS[id] = data.cards || [];
  QUESTIONS[id] = data.questions || [];
  loadedTopics[id] = true;
}
async function ensureLoaded(ids){
  const uniq = [...new Set((ids||[]).filter(Boolean))];
  await Promise.all(uniq.map(id => loadTopic(id).catch(e => console.warn('로드 실패:', e.message))));
}

/* 이야기 인덱스(메타·해금조건) — 시작 시 로드 */
let STORIES = [];
async function loadStoriesIndex(){
  try{
    const res = await fetch(`${DATA_BASE}/stories/index.json`);
    if(res.ok){ STORIES = (await res.json()).stories || []; }
  }catch(e){ STORIES = []; }
}
const storyCache = {};
async function loadStory(id){
  if(storyCache[id]) return storyCache[id];
  const res = await fetch(`${DATA_BASE}/stories/${id}.json`);
  if(!res.ok) throw new Error('story '+id);
  return storyCache[id] = await res.json();
}
async function loadDiagnostic(subject){
  const res = await fetch(`${DATA_BASE}/diagnostics/${subject}.json`);
  if(!res.ok) throw new Error('diag '+subject);
  return res.json();
}

/* ── 학습 단계(stage) ─────────────────────────────────────── */
const STAGE_ORDER = ['ms','hs','ug'];
const STAGE_LABEL = {ms:'입문', hs:'심화', ug:'전공'};
const STAGE_LABEL_TO = {ms:'입문으로', hs:'심화로', ug:'전공으로'};
function topicDomain(topicId){
  for(const d in CURRICULUM){ if((CURRICULUM[d]||[]).some(t=>t.id===topicId)) return d; }
  return null;
}
function currentStage(topicId){
  if(S.topicStage && S.topicStage[topicId]) return S.topicStage[topicId];
  const dom = topicDomain(topicId);
  return (dom && S.subjectStage[dom]) || 'ms';
}
/* 이 주제를 처음 시작하는 순간의 단계를 고정한다(그 뒤 진단을 다시 받아도
   이미 진행 중인 주제는 영향받지 않고, 앞으로 새로 시작하는 주제만 새 진단을 따른다). */
function ensureTopicStage(topicId){
  if(!S.topicStage[topicId]) S.topicStage[topicId] = currentStage(topicId);
  return S.topicStage[topicId];
}
function topicMeta(topicId){
  const d = topicDomain(topicId);
  return d ? (CURRICULUM[d]||[]).find(t=>t.id===topicId) : null;
}
/* 사용자가 직접 이 주제의 학습 단계를 바꾼다 (자동 승급과 별개로 언제든 수동 전환 가능) */
function setTopicStage(topicId, stage){
  if(!STAGE_ORDER.includes(stage) || S.topicStage[topicId]===stage) return;
  S.topicStage[topicId] = stage;
  save();
}
/* 그 단계의 카드·문제를 전부 봤는지(=그 단계를 완주했는지) 판정 */
function stageComplete(topicId, stage){
  const qs = (QUESTIONS[topicId]||[]).filter(q=>q.stage===stage);
  const cs = (CARDS[topicId]||[]).filter(c=>c.stage===stage);
  if(!qs.length && !cs.length) return false;
  return qs.every(q=>S.attempts[nsKey(topicId,q.id)]) && cs.every(c=>S.seenCards[nsKey(topicId,c.id)]);
}
/* 단계 완주 시 다음 단계로 승급, 전공까지 끝났으면 주제 완료 처리 */
function checkAndPromote(topicId){
  if(S.graduatedTopics[topicId]) return null;
  const stage = ensureTopicStage(topicId);
  if(!stageComplete(topicId, stage)) return null;
  const idx = STAGE_ORDER.indexOf(stage);
  if(idx < STAGE_ORDER.length - 1){
    const next = STAGE_ORDER[idx+1];
    S.topicStage[topicId] = next;
    return {type:'promote', uid:topicId, from:stage, to:next};
  }
  S.graduatedTopics[topicId] = true;
  return {type:'graduate', uid:topicId, from:stage};
}

/* ============================================================
   저장 모듈
   localStorage에 진도를 영구 저장한다. (서버 없이 기기 내 유지)
   기기 간 이동은 통계 탭의 내보내기/가져오기를 사용.
   ============================================================ */
const Storage = (() => {
  const KEY = 'haru-science-v1';
  return {
    load(){ try{ const v = localStorage.getItem(KEY); return v ? JSON.parse(v) : null; }catch(e){ return null; } },
    save(s){ try{ localStorage.setItem(KEY, JSON.stringify(s)); }catch(e){} },
  };
})();

/* ============================================================
   사용자 상태
   day: 시뮬레이션 날짜 카운터 (설정의 개발자 도구로 하루씩 넘겨
        간격 반복이 실제로 도는지 확인할 수 있다)
   ============================================================ */
const RELEARN_INTERVALS = [1, 3, 7, 21]; // 한 번이라도 틀린 뒤 다시 신뢰를 얻기까지 밟는 계단(일)
const REVIEW_CORRECT_DAYS = 180;         // 처음부터 맞혔거나 계단을 다 밟으면 6개월 뒤 재복습
const SESSION_Q = 8;                    // 카드를 다 배운 뒤(후반부) 문제만으로 채우는 세션의 문제 수
const REVIEW_BATCH = 10;                // '지금 복습하기' 한 번에 나오는 문제 수 (남으면 이어서 더 할 수 있음)
const DEV_MODE = new URLSearchParams(location.search).get('dev') === '0919';

let S = Storage.load() || {
  day: 0,
  streak: 0,
  lastStudyDay: -1,
  seenCards: {},        // cardId -> true
  srs: {},              // qId -> {step, due, graduated}
  attempts: {},         // qId -> {tries, correct}
  stats: {answered: 0, correct: 0},
  reports: [],          // {qId, day}
  storyReports: [],      // {storyId, day}
  qMeta: {},            // qId -> {q, topic}  미로딩 주제 표시·복습 로드용 스냅샷
  subjectStage: {physics:'ms', chem:'ms', bio:'ms', earth:'ms'},  // 과목별 진단 시작 단계(아직 시작 안 한 주제의 기본값)
  topicStage: {},        // topicId -> 'ms'|'hs'|'ug' (그 주제에서 현재 학습 중인 단계, 완주하면 자동 승급)
  diagDone: {},         // subject -> true (진단 완료 여부)
  diagBannerDismissed: false,  // 홈 진단 추천 배너를 건너뛰기로 닫았는지
  graduatedTopics: {},  // topicId -> true (전공 단계까지, 또는 전공으로 시작했으면 전공만 완료한 경우)
  readStories: {},      // storyId -> true
  studyDates: {},       // 'YYYY-MM-DD' -> true  (실제 달력 출석 기록)
  pendingSession: null, // 중단하고 나간 세션의 스냅샷 (이어하기용)
  cardsPerSession: 2,   // 세션 하나에 새로 배울 개념 카드 수(학습자가 홈에서 조절 가능)
  soundOn: true,        // 효과음 on/off (설정에서 토글)
};
/* 예전 저장본 마이그레이션(신규 필드 보강) */
S.subjectStage = Object.assign({physics:'ms',chem:'ms',bio:'ms',earth:'ms'}, S.subjectStage||{});
S.topicStage = S.topicStage || {};
if(S.pendingSession === undefined) S.pendingSession = null;
if(!S.cardsPerSession) S.cardsPerSession = 2;
if(S.soundOn === undefined) S.soundOn = true;
S.diagDone = S.diagDone || {};
S.graduatedTopics = S.graduatedTopics || {};
S.storyReports = S.storyReports || [];
S.readStories = S.readStories || {};
S.qMeta = S.qMeta || {};
S.studyDates = S.studyDates || {};
function save(){ Storage.save(S); }

/* 카드/문제 id는 파일마다 msc1·ugq3처럼 짧게 재사용돼서 주제 간에 충돌한다
   (예: p1-motion과 phy-newton이 둘 다 "msc1"을 씀). 그래서 진도 기록(attempts·srs·
   seenCards·qMeta)은 항상 "주제id::원래id" 형태의 네임스페이스된 키로 저장한다.
   이 스크립트 블록에서 바로 아래 마이그레이션이 즉시 실행되므로, nsKey는 반드시
   이 시점 이전(같은 <script> 블록 안)에 정의돼 있어야 한다 — 다른 <script> 블록에
   있으면 그 블록이 실행되기 전이라 호이스팅이 적용되지 않는다. */
function nsKey(unitId, localId){ return unitId + '::' + localId; }

/* 예전 저장본 마이그레이션: attempts·srs·qMeta·reports가 "주제id::원래id" 없이
   bare id로만 저장돼 있던 시절 데이터를, 같이 저장된 qMeta의 topic 정보를 이용해
   네임스페이스된 키로 옮긴다. topic을 알 수 없는 항목은 건드리지 않는다
   (findQ의 레거시 폴백이 처리). */
function migrateNamespacedKeys(){
  const topicOf = {};
  Object.keys(S.qMeta).forEach(k => {
    if(k.indexOf('::')===-1 && S.qMeta[k] && S.qMeta[k].topic) topicOf[k] = S.qMeta[k].topic;
  });
  if(!Object.keys(topicOf).length) return;

  ['attempts','srs','qMeta'].forEach(field => {
    const obj = S[field];
    Object.keys(obj).forEach(key => {
      if(key.indexOf('::') !== -1) return;
      const topic = topicOf[key];
      if(!topic) return;
      const newKey = nsKey(topic, key);
      if(!(newKey in obj)) obj[newKey] = obj[key];
      delete obj[key];
    });
  });
  (S.reports||[]).forEach(r => {
    if(r.qId && r.qId.indexOf('::')===-1 && topicOf[r.qId]) r.qId = nsKey(topicOf[r.qId], r.qId);
  });
  save();
}
migrateNamespacedKeys();

/* ── 출석(실제 달력 날짜 기반) ─────────────────────────────── */
function ymd(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function todayStr(){ return ymd(new Date()); }
function markAttendance(){ S.studyDates[todayStr()] = true; save(); }
function attendanceStreak(){   // 오늘(또는 어제)부터 거슬러 연속 학습일
  let n=0; const d=new Date();
  if(!S.studyDates[ymd(d)]){ d.setDate(d.getDate()-1); if(!S.studyDates[ymd(d)]) return 0; }
  while(S.studyDates[ymd(d)]){ n++; d.setDate(d.getDate()-1); }
  return n;
}
function bestStreak(){
  const days = Object.keys(S.studyDates).filter(k=>S.studyDates[k]).sort();
  if(!days.length) return 0;
  let best=1, cur=1;
  for(let i=1;i<days.length;i++){
    const prev=new Date(days[i-1]+'T00:00'), now=new Date(days[i]+'T00:00');
    const diff=Math.round((now-prev)/86400000);
    cur = (diff===1) ? cur+1 : 1;
    if(cur>best) best=cur;
  }
  return best;
}
function totalStudyDays(){ return Object.keys(S.studyDates).filter(k=>S.studyDates[k]).length; }
</script>
<script>
/* ============================================================
   유틸 및 LaTeX 렌더링 도구
   ============================================================ */
const $ = sel => document.querySelector(sel);
/* 부정어 강조(<b>,<u>)만 화이트리스트로 허용하고 나머지 태그는 이스케이프 */
const esc = s => s.replace(/&/g,'&amp;').replace(/<(?!\/?(b|u)>)/g,'&lt;');
const shuffle = a => { a=[...a]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; };
const LV = ['','기초','원리','오개념'];

function toast(msg){
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove('show'), 1800);
}

/* 가벼운 확인 팝업(넛지) — 진단 등 되돌리기 애매한 선택 전에 한 번 더 물어봄 */
function showConfirm(html){
  $('#confirm').innerHTML = `<div class="confirm-card">${html}</div>`;
  $('#confirm').classList.add('show');
}
function hideConfirm(){ $('#confirm').classList.remove('show'); }

function confirmSkipDiagnostic(){
  showConfirm(`
    <h3>진단 없이 시작할까요?</h3>
    <p>진단을 하지 않으면 <b>${STAGE_LABEL.ms}</b> 수준에서 시작합니다. 언제든 과목별 <b>진단</b> 버튼으로 다시 맞춰볼 수 있어요.</p>
    <div class="confirm-actions">
      <button class="btn btn-ghost" style="flex:1" onclick="hideConfirm()">진단하러 가기</button>
      <button class="btn btn-primary" style="flex:1" onclick="skipDiagnostic()">건너뛰기</button>
    </div>`);
}
function skipDiagnostic(){
  S.diagBannerDismissed = true; save();
  hideConfirm();
  toast(`${STAGE_LABEL.ms} 수준으로 시작해요`);
  render();
}

/* 문제/이야기 신고 — 사유를 적어 서버(Cloudflare Pages Function)로 전송, 실패해도 로컬 기록은 남는다 */
function reportLabel(type, id){
  if(type==='question') return qText(id);
  return (STORIES.find(s=>s.id===id)||{}).title || id;
}
function openReportModal(type, id){
  const label = reportLabel(type, id);
  showConfirm(`
    <h3>${type==='question'?'이 문제':'이 이야기'} 신고하기</h3>
    <p style="margin-bottom:8px">${esc(label)}</p>
    <textarea id="reportReason" placeholder="무엇이 잘못됐는지 알려주시면 확인에 도움이 돼요 (선택)" style="width:100%;min-height:70px;border:1px solid var(--line);border-radius:8px;padding:8px;font-family:inherit;font-size:13px;color:var(--ink);resize:vertical;margin-bottom:14px;background:var(--paper)"></textarea>
    <div class="confirm-actions">
      <button class="btn btn-ghost" style="flex:1" onclick="hideConfirm()">취소</button>
      <button class="btn btn-primary" style="flex:1" onclick="submitReport('${type}','${id}')">신고하기</button>
    </div>`);
}
async function submitReport(type, id){
  const reasonEl = document.getElementById('reportReason');
  const reason = reasonEl ? reasonEl.value.trim() : '';
  hideConfirm();

  if(type==='question'){
    if(!S.reports.some(r=>r.qId===id)) S.reports.push({qId:id, day:S.day});
    document.querySelectorAll(`.report-btn[data-report-id="${id}"]`).forEach(b=>{ b.textContent='신고 접수됨'; b.classList.add('done'); b.onclick=null; });
  } else {
    if(!S.storyReports.some(r=>r.storyId===id)) S.storyReports.push({storyId:id, day:S.day});
    document.querySelectorAll(`.report-btn[data-report-id="${id}"]`).forEach(b=>{ b.textContent='신고 접수됨'; b.classList.add('done'); b.onclick=null; });
  }
  save();
  toast('신고했어요. 확인 후 반영할게요');

  try{
    await fetch('/api/report', {
      method:'POST',
      headers:{'content-type':'application/json'},
      body: JSON.stringify({ type, id, title: reportLabel(type, id), reason, day: S.day })
    });
  }catch(e){ /* 네트워크 실패해도 로컬 기록은 이미 남았으니 조용히 무시 */ }
}

/* 동적 DOM 교체 시 KaTeX 렌더링을 격발해주는 안전 래퍼 함수 */
/* 채점 마크(동그라미/X)를 전체 선택지 목록 가운데가 아니라, 실제로 고른 선택지 위에 오도록 위치를 맞춘다 */
function positionGradeMark(picked){
  const markEl = $('#gradeMark');
  const wrap = markEl && markEl.closest('.grade-wrap');
  const btn = wrap && wrap.querySelector(`.choice[data-i="${picked}"]`);
  if(!markEl || !wrap || !btn) return;
  const wrapRect = wrap.getBoundingClientRect();
  const btnRect = btn.getBoundingClientRect();
  const centerY = btnRect.top - wrapRect.top + btnRect.height / 2;
  markEl.style.top = (centerY - 65) + 'px';
}

function triggerMathRender(target) {
  const el = target || document.getElementById('app');
  if (typeof renderMathInElement !== 'undefined' && el) {
    try {
      renderMathInElement(el, {
        delimiters: [
          {left: '$$', right: '$$', display: true},
          {left: '$', right: '$', display: false}
        ],
        throwOnError: false
      });
    } catch(e) {
      console.warn('KaTeX 수식 렌더링에 오류가 발생했습니다:', e);
    }
  }
}

function findQ(qId){
  const sep = qId.indexOf('::');
  if(sep !== -1){
    const unit = qId.slice(0, sep), local = qId.slice(sep+2);
    const arr = QUESTIONS[unit];
    const f = arr && arr.find(q=>q.id===local);
    if(f) return {...f, unit};
  }
  // 네임스페이스 되기 전(마이그레이션 이전) bare id 호환용 폴백 — 주제 간 충돌 가능성이 있으니
  // 새 코드에서는 항상 nsKey로 저장된 id를 넘겨야 한다.
  for(const u in QUESTIONS){ const f = QUESTIONS[u].find(q=>q.id===qId); if(f) return {...f, unit:u}; }
  return null;
}
/* 목록 표시용 문제 텍스트: 스냅샷 우선(미로딩 주제도 표시 가능) */
function qText(qId){ return (S.qMeta[qId]||{}).q || (findQ(qId)||{}).q || qId; }
function unitName(uid){
  if(SUENUNG_TITLES[uid]) return SUENUNG_TITLES[uid];
  for(const d in CURRICULUM){ const t = CURRICULUM[d].find(x=>x.id===uid); if(t) return t.title; }
  return uid;
}
function dueQuestions(){
  /* graduated는 '지금 6개월 대기 중'이라는 상태 표시일 뿐, 6개월 뒤 due가 되면 다시 나와야 하므로 필터에서 제외하지 않는다 */
  return Object.entries(S.srs)
    .filter(([id,v]) => v.due <= S.day)
    .map(([id]) => id);
}

/* ============================================================
   세션 엔진
   규칙: 복습 예정 문제 우선 → 부족분은 해당 단원의 새 문제
   ============================================================ */
let sess = null;
let cardBrowse = null; // {unitId, cardId} — 완주한 주제에서 개념 카드 하나를 골라 다시 보는 모드

/* ── 효과음 (Web Audio API로 즉석 생성, 외부 파일 없음) ──────────────
   오디오 컨텍스트는 브라우저 자동재생 정책 때문에 사용자 제스처(클릭) 안에서만
   시작·재개할 수 있어서, 첫 재생 호출 시점에 지연 생성한다. */
const SFX = (() => {
  let ctx = null;
  function ac(){
    if(!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if(ctx.state === 'suspended') ctx.resume();
    return ctx;
  }
  function tone(freq, start, dur, type, peak, rampTo){
    const c = ac();
    const t0 = c.currentTime + start;
    const osc = c.createOscillator();
    const gain = c.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    if(rampTo) osc.frequency.exponentialRampToValueAtTime(rampTo, t0 + dur);
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.linearRampToValueAtTime(peak, t0 + 0.006);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(gain).connect(c.destination);
    osc.start(t0);
    osc.stop(t0 + dur + 0.02);
  }
  function scratch(start, dur, peak, filterFreq, q){
    /* 색연필/사각사각 소리 — 필터를 통과시킨 백색소음 */
    const c = ac();
    const t0 = c.currentTime + start;
    const n = Math.max(1, Math.floor(c.sampleRate * dur));
    const buf = c.createBuffer(1, n, c.sampleRate);
    const data = buf.getChannelData(0);
    for(let i=0;i<n;i++) data[i] = (Math.random()*2-1) * (1 - i/n);
    const src = c.createBufferSource();
    src.buffer = buf;
    const filter = c.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = filterFreq;
    filter.Q.value = q || 0.9;
    const gain = c.createGain();
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.linearRampToValueAtTime(peak, t0 + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    src.connect(filter).connect(gain).connect(c.destination);
    src.start(t0);
  }
  const on = () => S.soundOn !== false;
  return {
    click(){ if(!on()) return; try{ tone(680, 0, 0.05, 'sine', 0.09); }catch(e){} },
    correct(){
      /* 색연필로 동그라미를 그리는 느낌: 짧은 사각사각 스트로크 3번을 겹쳐서
         원을 그리는 손동작을 흉내내고, 끝에 살짝 밝은 확인음을 얹는다 */
      if(!on()) return;
      try{
        scratch(0,    0.10, 0.22, 2400, 1.1);
        scratch(0.07, 0.10, 0.24, 3200, 1.1);
        scratch(0.14, 0.11, 0.22, 2700, 1.1);
        scratch(0.21, 0.09, 0.18, 3600, 1.3);
        tone(660, 0.30, 0.14, 'triangle', 0.09, 920);
      }catch(e){}
    },
    wrong(){ if(!on()) return; try{ tone(200, 0, 0.16, 'sawtooth', 0.08, 130); }catch(e){} },
    complete(){
      if(!on()) return;
      try{
        tone(523.25, 0, 0.11, 'sine', 0.09);
        tone(659.25, 0.09, 0.11, 'sine', 0.09);
        tone(783.99, 0.18, 0.18, 'sine', 0.10);
      }catch(e){}
    }
  };
})();
function toggleSound(){
  S.soundOn = S.soundOn === false ? true : false;
  save();
  if(S.soundOn) SFX.click();
  render();
}
/* 버튼 클릭음: 개별 onclick마다 손대지 않고 전역에서 button 클릭을 위임 감지 */
document.addEventListener('click', e => {

}, true);

/* ── 모바일 뒤로가기(TWA) 대응 ─────────────────────────────
   세션/진단/이야기 모달을 열 때 히스토리에 더미 상태를 쌓아두면,
   Android 뒤로가기가 앱 종료 대신 모달 닫기로 이어진다.
   모달이 없는 '홈' 상태에서는 별도의 가드 상태를 하나 더 쌓아 두어,
   뒤로가기를 한 번 누르면 "한 번 더 누르면 종료" 안내만 뜨고,
   그 안내가 뜬 채로(약 2.2초 안에) 다시 누를 때만 실제로 앱이 종료되게 한다. */
function openModalHistory(){
  history.pushState({ haruModal: true }, '');
}
/* 세션을 닫은 직후 한 번만 실행할 후속 동작(주제 완주 시 탐색 탭으로 이동 등) */
let postCloseAction = null;
function finishCloseModal(){
  sess = null; diag = null; cardBrowse = null;
  $('#session').classList.remove('open');
  render();
  if(postCloseAction){ const fn = postCloseAction; postCloseAction = null; fn(); }
}
function closeModal(){
  if(history.state && history.state.haruModal) history.back();
  else finishCloseModal();
}
let exitWarned = false, exitWarnTimer = null;
function armExitGuard(){
  history.pushState({ haruExitGuard: true }, '');
}
window.addEventListener('popstate', () => {
  if($('#session').classList.contains('open')){
    if(sess && sess.phase !== 'done' && !abandonConfirmed){
      openModalHistory();       // 뒤로가기로 빠진 히스토리 한 칸을 다시 채워, 취소 시 모달 안에 그대로 남는다
      confirmCloseSession();
      return;
    }
    abandonConfirmed = false;
    finishCloseModal();
    return;
  }
  // 모달이 열려있지 않은 상태에서 뒤로가기 = 앱을 종료하려는 시도
  if(exitWarned) return; // 안내가 뜬 채로 다시 눌렀으니 그대로 종료되도록 둔다
  exitWarned = true;
  toast('뒤로가기를 한 번 더 누르면 하루사이가 종료돼요');
  clearTimeout(exitWarnTimer);
  exitWarnTimer = setTimeout(() => { exitWarned = false; armExitGuard(); }, 2200);
});
armExitGuard();

/* 세션은 그 주제의 현재 단계(topicStage)에서만 채운다 — 다른 단계로 섞이지 않는다.
   그 단계를 완주하면(=새로 낼 카드·문제가 하나도 안 남으면) 세션 종료 시 자동 승급된다.

   학습 세션은 복습을 섞지 않는다 — 복습은 홈 화면의 '지금 복습하기' 전용 플로우
   (startReview)로만 한다. 학습과 복습을 억지로 한 세션에 합치면 둘 다 애매해지므로
   완전히 분리한다.

   한 세션 = 한 개념: 아직 안 본 카드가 있으면 딱 1장만 꺼내고, 그 카드에 딸린 확인
   문제를 (개수 상관없이) 그대로 뒤에 붙인다. 카드마다 딸린 문제 수가 달라도 억지로
   맞추지 않는다 — 세션 길이가 카드마다 달라지는 걸 받아들이는 대신, 개념 하나를
   온전히 끝내고 그 확인까지 한 호흡에 마치게 한다.
   그 단계의 카드를 모두 다 봤으면(개념 학습 끝) 그다음부터는 '후반부'로 넘어가서
   카드 없이 그 단계에 남은 문제만으로 세션을 채운다(SESSION_Q개씩). */
function buildSession(unitId){
  const stage = ensureTopicStage(unitId);
  const allQ = QUESTIONS[unitId] || [];
  const allC = CARDS[unitId] || [];
  const usedQ = new Set();
  const steps = [];

  const newCards = allC.filter(c => c.stage===stage && !S.seenCards[nsKey(unitId,c.id)]).slice(0, S.cardsPerSession||2);
  if(newCards.length){
    newCards.forEach(card => {
      steps.push({type:'card', id:card.id});
      allQ.filter(q => q.card===card.id && q.stage===stage && !S.attempts[nsKey(unitId,q.id)] && !usedQ.has(q.id))
        .forEach(q => { steps.push({type:'q', id:nsKey(unitId,q.id)}); usedQ.add(q.id); });
    });
  } else {
    allQ.filter(q => q.stage===stage && !S.attempts[nsKey(unitId,q.id)] && !usedQ.has(q.id))
      .slice(0, SESSION_Q)
      .forEach(q => { steps.push({type:'q', id:nsKey(unitId,q.id)}); usedQ.add(q.id); });
  }

  return { unitId, isDrill:false, isReview:false, stage, topics:[unitId], steps, idx: 0, correct: 0, answered: false, phase: steps.length ? 'run' : 'done' };
}

/* 세션 도중 상태 저장 — 앱을 닫아도 나중에 이어할 수 있게 스냅샷을 남긴다.
   phase가 'done'이 되면(정상 종료) 스냅샷을 지운다. */
function persistSessionSnapshot(){
  if(!sess || sess.phase === 'done'){ S.pendingSession = null; save(); return; }
  S.pendingSession = {
    unitId: sess.unitId, isDrill: !!sess.isDrill, isReview: !!sess.isReview,
    stage: sess.stage, topics: sess.topics, steps: sess.steps, idx: sess.idx, correct: sess.correct
  };
  save();
}

let pendingProceedAfterDiscard = null;
/* 대기 중인 세션이 있으면 이어하기/처음부터 확인창을 띄우고 true(가로챔)를 반환.
   없으면 false를 반환해 호출부가 그대로 진행하게 한다. */
function offerResumeOrProceed(proceedFn){
  if(!S.pendingSession) return false;
  pendingProceedAfterDiscard = proceedFn;
  showConfirm(`
    <h3>학습 중인 세션이 있어요</h3>
    <p>지난번에 풀던 세션을 이어서 하시겠어요? 지금까지 푼 문제는 이미 저장돼 있어요.</p>
    <div class="confirm-actions">
      <button class="btn btn-ghost" style="flex:1" onclick="discardPendingAndProceed()">처음부터</button>
      <button class="btn btn-primary" style="flex:1" onclick="resumePendingSession()">이어하기</button>
    </div>`);
  return true;
}
/* "처음부터"로 세션을 버릴 때, 아직 그 카드의 문제를 다 풀지 못한 채 넘어간 카드는
   seenCards 기록을 되돌려서 새 세션이 이 카드를 건너뛰지 않고 다시 보여주게 한다.
   (진행 중이던 카드까지만 되돌리면 되고, 그 뒤 카드들은 애초에 손댄 적이 없다) */
function revertIncompleteSession(p){
  if(!p || !p.steps || !p.steps.length) return;
  let i = 0;
  while(i < p.steps.length){
    const step = p.steps[i];
    if(step.type !== 'card'){ i++; continue; }
    let j = i+1;
    while(j < p.steps.length && p.steps[j].type === 'q') j++;
    if(p.idx < j){
      delete S.seenCards[nsKey(p.unitId, step.id)];
      for(let k=i+1; k<j && k<p.idx; k++){
        const qKey = p.steps[k].id;
        const at = S.attempts[qKey];
        if(at){
          S.stats.answered = Math.max(0, S.stats.answered - at.tries);
          S.stats.correct = Math.max(0, S.stats.correct - at.correct);
        }
        delete S.attempts[qKey];
        delete S.srs[qKey];
      }
      break;
    }
    i = j;
  }
}
function discardPendingAndProceed(){
  revertIncompleteSession(S.pendingSession);
  S.pendingSession = null; save(); hideConfirm();
  const fn = pendingProceedAfterDiscard; pendingProceedAfterDiscard = null;
  if(fn) fn();
}
async function resumePendingSession(){
  const p = S.pendingSession;
  hideConfirm();
  try { await ensureLoaded(p.topics||[]); }
  catch(e){ toast('콘텐츠를 불러오지 못했어요'); return; }
  sess = { unitId:p.unitId, isDrill:p.isDrill, isReview:p.isReview, stage:p.stage, topics:p.topics, steps:p.steps, idx:p.idx, correct:p.correct, answered:false, phase:'run' };
  pendingProceedAfterDiscard = null;
  openModalHistory();
  $('#session').classList.add('open');
  renderSession();
}

function setCardsPerSession(n){
  S.cardsPerSession = Math.max(1, Math.min(5, Number(n)||2));
  save();
  render();
}

/* 이미 완주한 주제 — 진행 기록은 그대로 두고, 개념 카드 목록에서 다시 보고 싶은 걸 골라서 훑어본다 */
async function openCardBrowser(unitId){
  try { await ensureLoaded([unitId]); }
  catch(e){ toast('콘텐츠를 불러오지 못했어요'); return; }
  cardBrowse = { unitId, cardId: null };
  openModalHistory();
  $('#session').classList.add('open');
  renderCardBrowse();
}
/* 카드 하나를 고르면 그 개념 + 거기 딸린 문제까지 원래 학습 흐름 그대로 이어서 보여준다 */
async function pickBrowseCard(cardId){
  const unitId = cardBrowse.unitId;
  try { await ensureLoaded([unitId]); } catch(e){ toast('콘텐츠를 불러오지 못했어요'); return; }
  const stage = ensureTopicStage(unitId);
  const steps = [{type:'card', id:cardId}];
  (QUESTIONS[unitId]||[]).filter(q=>q.card===cardId && q.stage===stage)
    .forEach(q => steps.push({type:'q', id:nsKey(unitId,q.id)}));
  sess = { unitId, isDrill:false, isReview:false, isCardReview:true, stage, topics:[unitId], steps, idx:0, correct:0, answered:false, phase:'run' };
  renderSession();
}
/* 개념-문제 복습을 마치고 '목록으로'를 누르면 세션을 닫는 대신 개념 목록으로 돌아간다 */
function backToBrowseList(){
  const unitId = sess ? sess.unitId : cardBrowse.unitId;
  sess = null;
  cardBrowse = { unitId, cardId: null };
  renderCardBrowse();
}
function renderCardBrowse(){
  const el = $('#session');
  const unitId = cardBrowse.unitId;
  const head = `
    <div class="sess-top">
      <button class="sess-close" onclick="closeModal()" aria-label="닫기">×</button>
      <span class="mono" style="font-size:11px;color:var(--ink-faint)">${esc(unitName(unitId))} · 개념 다시보기</span>
    </div>`;

  const bystage = {};
  (CARDS[unitId]||[]).forEach(c=>{ (bystage[c.stage] = bystage[c.stage]||[]).push(c); });
  const listHtml = STAGE_ORDER.filter(s=>bystage[s] && bystage[s].length).map(s => `
    <div class="section-label" style="margin-top:14px">${STAGE_LABEL[s]}</div>
    ${bystage[s].map(c=>`<div class="unit-item" style="cursor:pointer" onclick="pickBrowseCard('${c.id}')">
      <span class="u-name">${esc(c.title)}</span>
    </div>`).join('')}
  `).join('');

  el.innerHTML = head + `
    <div class="sess-body">
      <p style="font-size:13px;color:var(--ink-soft);margin-bottom:10px">다시 보고 싶은 개념을 골라보세요. 딸린 문제도 함께 풀 수 있어요.</p>
      ${listHtml || '<p style="color:var(--ink-faint);font-size:13px">등록된 개념 카드가 없어요.</p>'}
    </div>`;
}

async function startSession(unitId, opts){
  if(!(opts && opts.skipResumeCheck) && offerResumeOrProceed(() => startSession(unitId, {skipResumeCheck:true}))) return;
  try { await ensureLoaded([unitId]); }
  catch(e){ toast('콘텐츠를 불러오지 못했어요'); return; }
  /* 지난 세션이 마지막 문제를 풀고도 앱이 닫혀 승급 체크를 못 받았을 경우의 안전망 */
  const promo = checkAndPromote(unitId);
  if(promo){ save(); if(promo.type==='promote') toast(`${STAGE_LABEL[promo.to]} 단계로 승급했어요!`); }
  if(S.graduatedTopics[unitId]){ openCardBrowser(unitId); return; }
  const s = buildSession(unitId);
  if(!s.steps.length){
    const stage = currentStage(unitId);
    toast(`${STAGE_LABEL[stage]} 단계의 새 문제를 모두 마쳤어요. 복습은 "지금 복습하기"에서 이어가요`); return;
  }
  sess = s;
  persistSessionSnapshot();
  openModalHistory();
  $('#session').classList.add('open');
  renderSession();
}
/* 결과 화면(phase='done')에서 닫을 때는 확인 없이 바로 닫는다 */
function closeSession(){ closeModal(); }
/* 세션 도중(진행 중) 닫으려 할 때는 한 번 확인한다 — × 버튼과 뒤로가기 모두 여기를 거친다 */
let abandonConfirmed = false;
function confirmCloseSession(){
  if(!sess || sess.phase === 'done'){ closeModal(); return; }
  showConfirm(`
    <h3>학습을 중단하시겠습니까?</h3>
    <p>지금까지 푼 문제는 저장돼 있어요. 나중에 이어서 하실 수 있어요.</p>
    <div class="confirm-actions">
      <button class="btn btn-primary" style="flex:1" onclick="hideConfirm()">계속하기</button>
      <button class="btn btn-ghost" style="flex:1" onclick="abandonSession()">중단하기</button>
    </div>`);
}
function abandonSession(){
  abandonConfirmed = true;
  hideConfirm();
  closeModal();
}

/* 문제풀기(양치기) — 여러 주제의 문제를 모아 카드 없이 문제만 연속으로 푸는 모드 */
async function startDrill(opts){
  if(!(opts && opts.skipResumeCheck) && offerResumeOrProceed(() => startDrill({skipResumeCheck:true}))) return;
  const subjects = drillSubject==='all' ? Object.keys(SUENUNG_BANKS) : [drillSubject];
  if(!subjects.some(s=>SUENUNG_BANKS[s])){ toast('아직 준비된 수능형 문제은행이 없어요'); return; }
  try { await Promise.all(subjects.map(ensureSuenungLoaded)); }
  catch(e){ toast('콘텐츠를 불러오지 못했어요'); return; }

  const bankIds = subjects.map(s=>SUENUNG_BANKS[s]).filter(Boolean);
  let pool = [];
  bankIds.forEach(uid=>{
    (QUESTIONS[uid]||[]).forEach(q=>{
      if(drillStage==='all' || q.stage===drillStage) pool.push(nsKey(uid,q.id));
    });
  });
  if(!pool.length){ toast('조건에 맞는 문제가 없어요. 다른 조건으로 시도해보세요'); return; }

  const steps = shuffle(pool).slice(0, drillCount).map(id => ({type:'q', id}));
  sess = { unitId:null, isDrill:true, isReview:false, stage:drillStage, topics:bankIds, steps, idx:0, correct:0, answered:false, phase: steps.length ? 'run' : 'done' };
  persistSessionSnapshot();
  openModalHistory();
  $('#session').classList.add('open');
  renderSession();
}

/* 복습 전용 세션 — 밀린 복습을 한 번에 다 쏟아내지 않고 REVIEW_BATCH개씩 꺼내고,
   다 풀면 남은 개수를 보여주며 이어서 더 할지 고를 수 있게 한다. */
async function startReview(opts){
  if(!(opts && opts.skipResumeCheck) && offerResumeOrProceed(() => startReview({skipResumeCheck:true}))) return;
  const due = dueQuestions();
  if(!due.length){ toast('지금은 밀린 복습이 없어요'); return; }
  const dueTopics = due.map(qId => (S.qMeta[qId]||{}).topic).filter(Boolean);
  try { await ensureLoaded(dueTopics); }
  catch(e){ toast('콘텐츠를 불러오지 못했어요'); return; }
  const steps = shuffle(due).slice(0, REVIEW_BATCH).map(id => ({type:'q', id}));
  sess = { unitId:null, isDrill:false, isReview:true, stage:null, topics:dueTopics, steps, idx:0, correct:0, answered:false, phase: steps.length ? 'run' : 'done' };
  persistSessionSnapshot();
  openModalHistory();
  $('#session').classList.add('open');
  renderSession();
}

/* ============================================================
   스마트 라우팅 어댑티브 진단 평가 엔진 (Adaptive Diagnostic Engine)
   ============================================================ */
let diag = null;

async function startDiagnostic(subject){
  let data;
  try { data = await loadDiagnostic(subject); }
  catch(e){ toast('진단을 불러오지 못했어요'); return; }

  // 1. 가져온 문제들을 난이도별(ms, hs, ug) 풀로 쪼개어 무작위화 준비
  const pool = { ms: [], hs: [], ug: [] };
  (data.items || []).forEach(it => {
    if (pool[it.stage]) pool[it.stage].push(it);
  });

  // 혹시라도 첫 기준점인 '심화(hs)' 문항이 비어있는지 진단 품질 검사
  if (!pool['hs'] || pool['hs'].length === 0) {
    toast('진단에 필요한 문항 데이터가 불충분합니다.');
    return;
  }

  // 2. 어댑티브 진단 세션 구조체 초기화
  diag = {
    subject,
    title: data.title,
    pool,                 // 전체 난이도별 문항 저장소
    currentStage: 'hs',   // 진입 첫 단계는 무조건 '심화(hs)'으로 허리 라인 시작
    stageStep: 1,         // 진단 단계 (1단계: 심화 ➔ 2단계: 결과에 따른 입문 또는 전공 분기)
    stageIdx: 0,          // 현재 가동 단계에서 풀고 있는 문제 인덱스 (0, 1, 2)
    stageItems: [],       // 현재 가동 단계에서 제시되는 3문항 묶음
    answered: false,
    correctCount: 0,      // 현재 가동 단계 내에서 맞춘 개수 (3개 만점 기준 분기 판단용)
    correct: { ms: 0, hs: 0, ug: 0 },
    total: { ms: 0, hs: 0, ug: 0 }
  };

  // 심화(hs) 풀에서 무작위로 3문항을 추출하여 1단계 문제 세트 생성
  diag.stageItems = shuffle(pool['hs']).slice(0, 3);

  openModalHistory();
  $('#session').classList.add('open');
  renderDiag();
}

function closeDiag(){ closeModal(); }

function renderDiag(){
  const el = $('#session');
  if(!diag) return;

  // 전체 6문항 중 현재 풀고 있는 글로벌 진행 번호 계산 (0 ~ 5)
  const globalIdx = (diag.stageStep - 1) * 3 + diag.stageIdx;
  
  if(globalIdx >= 6 || diag.stageIdx >= diag.stageItems.length){
    return renderDiagResult(el);
  }

  const it = diag.stageItems[diag.stageIdx];
  const unknownBtn = `<button class="choice unknown-choice" data-i="-1" onclick="answerDiag(-1)">🤷 잘 모르겠어요</button>`;
  let choices;
  if(it.type==='ox'){
    choices = `<div class="ox-wrap with-unknown">
      <button class="choice" data-i="1" onclick="answerDiag(1)">O</button>
      <button class="choice" data-i="0" onclick="answerDiag(0)">X</button>
      ${unknownBtn}</div>`;
  } else {
    choices = it.choices.map((c,i)=>`<button class="choice" data-i="${i}" onclick="answerDiag(${i})">${esc(c)}</button>`).join('') + unknownBtn;
  }

  el.innerHTML = `
    <div class="sess-top">
      <button class="sess-close" onclick="closeDiag()" aria-label="닫기">×</button>
      <div class="sess-track"><i style="width:${Math.round(100 * globalIdx / 6)}%"></i></div>
      <span class="mono" style="font-size:11px;color:var(--ink-faint)">어댑티브 진단 (${STAGE_LABEL[diag.currentStage]})</span>
    </div>
    <div class="sess-body">
      <span class="eyebrow">${esc(diag.title)} · 문항 ${globalIdx + 1}/6</span>
      <p class="q-text" style="margin-top:12px">${esc(it.q)}</p>
      <div class="grade-wrap" id="gradeWrap">${choices}<div class="grade-mark" id="gradeMark"></div></div>
      <div id="explainBox"></div>
    </div>
    <div class="sess-foot" id="sessFoot"></div>`;

  // 수식 렌더링 격발
  triggerMathRender(el);
}

function answerDiag(picked){
  if(diag.answered) return;
  diag.answered = true;

  const it = diag.stageItems[diag.stageIdx];
  const correctIdx = it.type==='ox' ? (it.answer?1:0) : it.answer;
  const isUnknown = picked === -1;
  const ok = !isUnknown && picked === correctIdx;

  // 통계 집계 (모름은 정답으로 세지 않되, 찍어서 우연히 맞는 경우를 막기 위해 total에는 포함한다)
  diag.total[it.stage]++;
  if(ok) {
    diag.correct[it.stage]++;
    diag.correctCount++;
  }

  // 선택지 잠금 및 시각화 채점 피드백
  document.querySelectorAll('.choice').forEach(b=>{
    b.disabled = true;
    const i = +b.dataset.i;
    if(i === picked) b.classList.add(isUnknown ? 'picked-unknown' : (ok ? 'picked-right' : 'picked-wrong'));
    if(!ok && i === correctIdx) b.classList.add('reveal-answer');
  });

  $('#gradeMark').innerHTML = isUnknown ? '' : (ok
    ? `<svg viewBox="0 0 100 100"><defs>
        <filter id="pencilTex" x="-30%" y="-30%" width="160%" height="160%">
          <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="2" seed="3" result="n"/>
          <feDisplacementMap in="SourceGraphic" in2="n" scale="3" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
        <filter id="pencilTex2" x="-30%" y="-30%" width="160%" height="160%">
          <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" seed="9" result="n"/>
          <feDisplacementMap in="SourceGraphic" in2="n" scale="2.4" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
      </defs><path class="draw-o" d="M50 12 C70 9 84 20 85 38 C86 52 84 66 74 76 C64 87 45 92 32 85 C18 78 11 62 13 46 C15 30 25 16 42 13 C45 12.3 47 12 50 12 L57 16"/><path class="draw-o2" d="M46 16 C30 15 17 28 15 45 C14 58 20 70 31 78 C44 87 62 86 73 76 C83 67 87 52 83 39 C79 26 66 15 51 15 C49.5 15 48 15.5 47 16"/></svg>`
    : `<svg viewBox="0 0 100 100"><path class="draw-x" d="M78 18 L22 86"/></svg>`);
  if(!isUnknown) positionGradeMark(picked);

  const verdictClass = isUnknown ? 'unknown' : (ok ? 'ok' : 'no');
  const verdictText = isUnknown ? '모름' : (ok ? '정답' : '오답');
  $('#explainBox').innerHTML = `<div class="explain"><div class="verdict ${verdictClass}">${verdictText}</div>${esc(it.ex)}</div>`;
  
  // 새로 뿌려진 해설 영역 내 수식 렌더링 격발
  triggerMathRender($('#explainBox'));

  const globalIdx = (diag.stageStep - 1) * 3 + diag.stageIdx;
  const isLast = (globalIdx + 1) >= 6;
  $('#sessFoot').innerHTML = `<button class="btn btn-primary" onclick="nextDiag()">${isLast ? '결과 보기' : '다음'}</button>`;
}

function nextDiag(){
  diag.answered = false;
  diag.stageIdx++;

  // 현재 난이도의 3개 문항을 다 풀었을 때 분기 계산 (Routing Trigger)
  if(diag.stageIdx >= diag.stageItems.length) {
    if(diag.stageStep === 1) {
      // 1단계(심화) 종료 지점
      diag.stageStep = 2;
      diag.stageIdx = 0;

      if(diag.correctCount >= 2) {
        // [우수] 3문제 중 2문제 이상 정답 ➔ '전공(ug)' 코스로 상향 라우팅!
        diag.currentStage = 'ug';
      } else {
        // [미흡] 3문제 중 1문제 이하 정답 ➔ '입문(ms)' 코스로 하향 라우팅!
        diag.currentStage = 'ms';
      }
      
      diag.correctCount = 0; // 카운터 초기화
      const nextPool = diag.pool[diag.currentStage] || [];
      diag.stageItems = shuffle(nextPool).slice(0, 3);
      
      // 풀에 문제가 더 없을 경우를 대비한 방어 코드
      if (diag.stageItems.length === 0) {
        return renderDiagResult($('#session'));
      }
    } else {
      // 2단계까지 모두 완료한 경우
      return renderDiagResult($('#session'));
    }
  }

  // 예외 처리를 위한 글로벌 상한 경계 검사
  const globalIdx = (diag.stageStep - 1) * 3 + diag.stageIdx;
  if(globalIdx >= 6){
    return renderDiagResult($('#session'));
  }

  renderDiag();
}

function recommendStage(correct, total){
  // 어댑티브 라우팅 판별 수식
  // 2단계에서 '전공(ug)' 경로를 거쳤을 경우
  if ((total['ug'] || 0) > 0) {
    // 전공 경로에서 2개 이상 맞추면 최종 [전공(ug)], 떨어지면 탄탄히 다지기 위해 [심화(hs)]부터 시작
    return (correct['ug'] >= 2) ? 'ug' : 'hs';
  }
  // 2단계에서 '입문(ms)' 경로를 거쳤을 경우
  if ((total['ms'] || 0) > 0) {
    // 입문 경로에서 2개 이상 맞추면 무난하게 [심화(hs)] 추천, 그 미만이면 완벽한 기초 보충 위해 [입문(ms)] 추천
    return (correct['ms'] >= 2) ? 'hs' : 'ms';
  }
  return 'hs';
}

function renderDiagResult(el){
  const rec = recommendStage(diag.correct, diag.total);
  const subj = diag.subject;
  S.subjectStage[subj] = rec;
  S.diagDone[subj] = true;
  save();

  const dName = (DOMAINS.find(d=>d.id===subj)||{}).name || subj;
  
  // 라우팅 여정의 궤적을 붉은펜 채점 스타일의 결과 리스트로 아름답게 조립
  let rows = '';
  
  // 1단계 기록 추가 (심화)
  if ((diag.total['hs'] || 0) > 0) {
    const passed = diag.correct['hs'] >= 2;
    rows += `
      <div class="result-row" style="border-left: 3px solid var(--bluepen); flex-direction:column; align-items:flex-start; gap:4px">
        <div style="display:flex; justify-content:space-between; width:100%; font-size:14px; font-weight:700">
          <span>1단계: ${STAGE_LABEL['hs']} 과정 (공통 기준점)</span>
          <b class="mono" style="color:var(--bluepen)">${diag.correct['hs']}/${diag.total['hs']}</b>
        </div>
        <div style="font-size:12px; color:var(--ink-soft)">
          ➔ ${passed ? `2문항 이상 정답으로 <b>상위 과정(${STAGE_LABEL.ug})</b>으로 맞춤 라우팅` : `1문항 이하 정답으로 <b>기초 과정(${STAGE_LABEL.ms})</b>으로 맞춤 라우팅`}
        </div>
      </div>`;
  }

  // 2단계 기록 추가 (입문 혹은 전공)
  const step2Stage = diag.total['ug'] > 0 ? 'ug' : (diag.total['ms'] > 0 ? 'ms' : null);
  if (step2Stage) {
    const isUg = step2Stage === 'ug';
    const passed = diag.correct[step2Stage] >= 2;
    let desc = '';
    if (isUg) {
      desc = passed ? `${STAGE_LABEL.ug} 수준의 고급 추론 능력이 입증되었습니다.` : `${STAGE_LABEL.hs} 원리는 잘 알지만 ${STAGE_LABEL.ug} 이론은 보완이 권장됩니다.`;
    } else {
      desc = passed ? `${STAGE_LABEL.ms} 기초 개념이 확실하여 ${STAGE_LABEL.hs} 과정 진입에 무리가 없습니다.` : `과학적 개념 오해를 해소하기 위해 ${STAGE_LABEL.ms} 기초 개념부터 빌드업이 필요합니다.`;
    }
    rows += `
      <div class="result-row" style="border-left: 3px solid ${isUg ? 'var(--d-space)' : 'var(--d-life)'}; flex-direction:column; align-items:flex-start; gap:4px; margin-top:8px">
        <div style="display:flex; justify-content:space-between; width:100%; font-size:14px; font-weight:700">
          <span>2단계: ${STAGE_LABEL[step2Stage]} 과정 (${isUg ? '상위 판정' : '기초 보정'})</span>
          <b class="mono" style="color:${isUg ? 'var(--d-space)' : 'var(--d-life)'}">${diag.correct[step2Stage]}/${diag.total[step2Stage]}</b>
        </div>
        <div style="font-size:12px; color:var(--ink-soft)">➔ ${desc}</div>
      </div>`;
  }

  el.innerHTML = `
    <div class="sess-top">
      <button class="sess-close" onclick="closeDiag()" aria-label="닫기">×</button>
      <div class="sess-track"><i style="width:100%"></i></div>
    </div>
    <div class="sess-body">
      <div class="result-hero" style="padding-bottom:18px">
        <div class="eyebrow" style="color:var(--redpen); margin-bottom:6px">ADAPTIVE DIAGNOSIS COMPLETE</div>
        <div class="big" style="font-size:38px; color:var(--redpen); font-weight:700">${STAGE_LABEL[rec]} 단계</div>
        <div class="sub" style="margin-top:10px; line-height:1.6; font-size:15px">
          ${dName} 진단 결과, 회원님의 최적 학습 출발지는 <b>${STAGE_LABEL[rec]}</b> 과정으로 설정되었습니다.
        </div>
      </div>
      <div class="section-label" style="margin-bottom:8px">어댑티브 라우팅 매칭 리포트</div>
      <div class="result-list">${rows}</div>
      <p class="dev-note" style="margin-top:16px; line-height:1.6">
        하루사이의 맞춤형 어댑티브 진단은 단순 선형 시험이 아닙니다. 중간층인 ${STAGE_LABEL.hs} 난이도의 정답 궤적을 토대로, 사용자를 상위/하위 검증 경로로 동적 우회하여 가장 빠르게 실제 이해도를 역추적해냅니다.
      </p>
    </div>
    <div class="sess-foot">
      <button class="btn btn-primary" onclick="closeDiag()">맞춤 과정으로 바로 시작</button>
    </div>`;

  triggerMathRender(el);
}

/* ============================================================
   이야기 리더 + 해금 판정
   ============================================================ */
function storyUnlocked(st){
  const u = st.unlock || {}; const scope = u.scope || [];
  if(u.type==='topicsStarted'){
    return scope.filter(tid=>topicStarted(tid)).length >= (u.count||1);
  }
  if(u.type==='correctInTopic'){
    let n=0; for(const qId in S.attempts){ const m=S.qMeta[qId];
      if(m && scope.includes(m.topic) && S.attempts[qId].correct>0) n++; }
    return n >= (u.count||1);
  }
  return false;
}

        return `<div style="margin-top:18px"><button class="report-btn ${reported?'done':''}" data-report-id="${id}" onclick="${reported?'':`openReportModal('story','${id}')`}">${reported?'신고 접수됨':'이 이야기 신고하기'}</button></div>`; })()}
    </div>
    <div class="sess-foot"><button class="btn btn-primary" onclick="closeStory()">닫기</button></div>`;

  openModalHistory();
  $('#session').classList.add('open');
  triggerMathRender(el);
}
function closeStory(){ closeModal(); }

function sessProgress(){
  const total = sess.steps.length;
  return total ? Math.round(100 * sess.idx / total) : 100;
}
function findCard(unitId, cardId){ return (CARDS[unitId]||[]).find(c=>c.id===cardId); }

/* 세션 상단에 표시할 라벨: 일반 세션은 주제명, 문제풀기/복습(다중 주제)은 현재 문제의 출처 주제명 */
function sessLabel(){
  const step = sess.steps[sess.idx];
  if(sess.isDrill){
    const q = step && findQ(step.id);
    return q ? `문제풀기 · ${unitName(q.unit)}` : '문제풀기';
  }
  if(sess.isReview){
    const topic = step && (S.qMeta[step.id]||{}).topic;
    return topic ? `복습 · ${unitName(topic)}` : '복습';
  }
  return `${unitName(sess.unitId)} · ${STAGE_LABEL[sess.stage]}`;
}

/* 일반 주제 학습 세션(양치기·복습·개념 다시보기 제외)에서만 단계를 직접 바꿀 수 있게 한다 */
function stageSwitcherHtml(){
  if(sess.isDrill || sess.isReview || sess.isCardReview) return '';
  const meta = topicMeta(sess.unitId);
  if(!meta || !meta.stages || meta.stages.length<2) return '';
  return `<div style="display:flex;gap:5px;padding:0 18px 10px">
    ${meta.stages.map(s=>`<button onclick="switchSessionStage('${s}')" style="cursor:pointer;font-family:inherit;font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:99px;border:1px solid ${s===sess.stage?'var(--coral)':'var(--line)'};background:${s===sess.stage?'var(--coral)':'var(--card)'};color:${s===sess.stage?'#fff':'var(--ink-soft)'}">${STAGE_LABEL[s]}</button>`).join('')}
  </div>`;
}
function switchSessionStage(stage){
  if(!sess || sess.stage===stage) return;
  showConfirm(`
    <h3>${STAGE_LABEL[stage]} 단계로 바꿀까요?</h3>
    <p>지금 풀던 카드·문제는 그대로 저장되고, ${STAGE_LABEL[stage]} 단계로 새로 시작합니다.</p>
    <div class="confirm-actions">
      <button class="btn btn-ghost" style="flex:1" onclick="hideConfirm()">취소</button>
      <button class="btn btn-primary" style="flex:1" onclick="confirmSwitchSessionStage('${stage}')">바꾸기</button>
    </div>`);
}
function confirmSwitchSessionStage(stage){
  hideConfirm();
  if(!sess || sess.stage===stage) return;
  const prevStage = sess.stage;
  setTopicStage(sess.unitId, stage);
  const s = buildSession(sess.unitId);
  if(!s.steps.length){
    toast(`${STAGE_LABEL[stage]} 단계에 새로 풀 문제가 없어요`);
    S.topicStage[sess.unitId] = prevStage; save();
    return;
  }
  sess = s;
  renderSession();
}
function renderSession(){
  const el = $('#session');
  if(!sess) return;
  if(sess.phase === 'done'){ renderResult(el); return; }
  const head = `
    <div class="sess-top">
      <button class="sess-close" onclick="confirmCloseSession()" aria-label="세션 닫기">×</button>
      <div class="sess-track"><i style="width:${sessProgress()}%"></i></div>
      <span class="mono" style="font-size:11px;color:var(--ink-faint)">${sessLabel()}</span>
    </div>
    ${stageSwitcherHtml()}`;

  const step = sess.steps[sess.idx];

  if(step.type === 'card'){
    const c = findCard(sess.unitId, step.id);
    el.innerHTML = head + `
      <div class="sess-body">
        <span class="eyebrow concept-tag">CONCEPT</span>
        <div class="card concept-card">
          <h2>${c.title}</h2>
          <p>${c.body}</p>
          ${c.fig ? `<figure class="figure">${c.fig}${c.figcap?`<figcaption>${c.figcap}</figcaption>`:''}</figure>` : ''}
          ${c.example ? `<div class="example">${c.example}</div>` : ''}
        </div>
      </div>
      <div class="sess-foot"><button class="btn btn-primary" onclick="nextCard()">이해했어요</button></div>`;
    triggerMathRender(el);
    return;
  }

  /* quiz */
  const qId = step.id;
  const q = findQ(qId);
  const isReview = !!S.attempts[qId] && !sess.answered;
  let choicesHtml = '';
  if(q.type === 'ox'){
    choicesHtml = `<div class="ox-wrap">
      <button class="choice" data-i="1" onclick="answer(1)">O</button>
      <button class="choice" data-i="0" onclick="answer(0)">X</button></div>`;
  } else {
    choicesHtml = q.choices.map((c,i)=>`<button class="choice" data-i="${i}" onclick="answer(${i})">${esc(c)}</button>`).join('');
  }
  const qNum = sess.steps.slice(0, sess.idx+1).filter(s=>s.type==='q').length;
  const qTotal = sess.steps.filter(s=>s.type==='q').length;
  el.innerHTML = head + `
    <div class="sess-body">
      <div style="display:flex;gap:6px;align-items:center" class="q-level">
        <span class="eyebrow">Q${qNum} / ${qTotal}</span>
        <span class="chip badge-ready">${LV[q.level]}</span>
        ${isReview?'<span class="chip" style="background:var(--redpen-soft);color:var(--redpen)">복습</span>':''}
        ${q.type==='misc'?'<span class="chip badge-soon">오개념 판별</span>':''}
      </div>
      <p class="q-text">${esc(q.q)}</p>
      ${q.fig ? `<figure class="figure q-figure">${q.fig}${q.figcap?`<figcaption>${q.figcap}</figcaption>`:''}</figure>` : ''}
      <div class="grade-wrap" id="gradeWrap">${choicesHtml}<div class="grade-mark" id="gradeMark"></div></div>
      <div id="explainBox"></div>
    </div>
    <div class="sess-foot" id="sessFoot"></div>`;

  triggerMathRender(el);
}

function nextCard(){
  const step = sess.steps[sess.idx];
  S.seenCards[nsKey(sess.unitId, step.id)] = true; save();
  advanceStep();
}

function advanceStep(){
  sess.idx++;
  sess.answered = false;
  if(sess.idx >= sess.steps.length){ finishSession(); return; }
  persistSessionSnapshot();
  renderSession();
}

function answer(picked){
  if(sess.answered) return;
  sess.answered = true;
  const qId = sess.steps[sess.idx].id;
  const q = findQ(qId);
  const correctIdx = q.type==='ox' ? (q.answer?1:0) : q.answer;
  const ok = picked === correctIdx;

  /* 기록 */
  const at = S.attempts[qId] || {tries:0, correct:0};
  at.tries++; if(ok) at.correct++;
  S.attempts[qId] = at;
  S.qMeta[qId] = {q: q.q, topic: q.unit};   // 미로딩 상태에서도 목록에 표시·복습 로드 가능
  S.stats.answered++; if(ok){ S.stats.correct++; sess.correct++; }

  /* 간격 반복 갱신 — 문제풀기(양치기)는 정답률만 기록하고 장기 복습 큐에는 넣지 않는다.
     처음부터 맞히면 바로 6개월, 한 번이라도 틀리면 1→3→7→21일 계단을 다시 밟아 신뢰를 되찾은 뒤에야 6개월로 간다. */
  if(!sess.isDrill){
    const cur = S.srs[qId];
    if(ok){
      const inRelearn = cur && Number.isInteger(cur.relearnStep) && cur.relearnStep >= 0;
      const next = inRelearn ? cur.relearnStep + 1 : -1;
      if(inRelearn && next < RELEARN_INTERVALS.length){
        S.srs[qId] = {due:S.day + RELEARN_INTERVALS[next], graduated:false, relearnStep:next};
      } else {
        S.srs[qId] = {due:S.day + REVIEW_CORRECT_DAYS, graduated:true, relearnStep:-1};
      }
    } else {
      S.srs[qId] = {due:S.day + RELEARN_INTERVALS[0], graduated:false, relearnStep:0};
    }
  }
  save();

  /* 선택지 잠금 + 표시 */
  document.querySelectorAll('.choice').forEach(b=>{
    b.disabled = true;
    const i = +b.dataset.i;
    if(i===picked) b.classList.add(ok?'picked-right':'picked-wrong');
    if(!ok && i===correctIdx) b.classList.add('reveal-answer');
  });

  /* 빨간펜 채점 마크 */
  $('#gradeMark').innerHTML = ok
    ? `<svg viewBox="0 0 100 100"><defs>
        <filter id="pencilTex" x="-30%" y="-30%" width="160%" height="160%">
          <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="2" seed="3" result="n"/>
          <feDisplacementMap in="SourceGraphic" in2="n" scale="3" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
        <filter id="pencilTex2" x="-30%" y="-30%" width="160%" height="160%">
          <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" seed="9" result="n"/>
          <feDisplacementMap in="SourceGraphic" in2="n" scale="2.4" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
      </defs><path class="draw-o" d="M50 12 C70 9 84 20 85 38 C86 52 84 66 74 76 C64 87 45 92 32 85 C18 78 11 62 13 46 C15 30 25 16 42 13 C45 12.3 47 12 50 12 L57 16"/><path class="draw-o2" d="M46 16 C30 15 17 28 15 45 C14 58 20 70 31 78 C44 87 62 86 73 76 C83 67 87 52 83 39 C79 26 66 15 51 15 C49.5 15 48 15.5 47 16"/></svg>`
    : `<svg viewBox="0 0 100 100"><path class="draw-x" d="M78 18 L22 86"/></svg>`;
  positionGradeMark(picked);
  ok ? SFX.correct() : SFX.wrong();

  /* 해설 */
  const reported = S.reports.some(r=>r.qId===qId);
  $('#explainBox').innerHTML = `
    <div class="explain">
      <div class="verdict ${ok?'ok':'no'}">${ok?'정답!':'오답'} ${!ok && !sess.isDrill ? '— 내일 복습 큐에 담았어요' : ''}</div>
      ${esc(q.ex)}
      <div><button class="report-btn ${reported?'done':''}" data-report-id="${qId}" onclick="${reported?'':`openReportModal('question','${qId}')`}">${reported?'신고 접수됨':'이 문제 신고하기'}</button></div>
    </div>`;

  triggerMathRender($('#explainBox'));

  $('#sessFoot').innerHTML = `<button class="btn btn-primary" onclick="nextQ()">${sess.idx+1>=sess.steps.length?'결과 보기':'다음 문제'}</button>`;
}

function nextQ(){ advanceStep(); }

function finishSession(){
  SFX.complete();
  sess.phase = 'done';
  S.pendingSession = null;          // 정상 종료했으니 이어할 스냅샷은 더 이상 필요 없음
  markAttendance();                 // 실제 달력 날짜로 출석 기록
  S.streak = attendanceStreak();    // 표시용 스트릭도 실제 날짜 기준
  /* 이 세션으로 현재 단계를 완주했는지 검사 → 다음 단계로 승급, 전공이면 주제 완료
     (문제풀기·복습은 여러 주제를 오갈 수 있어 전부 검사) */
  const touchedTopics = (sess.isDrill || sess.isReview)
    ? [...new Set(sess.steps.filter(s=>s.type==='q').map(s => (S.qMeta[s.id]||{}).topic).filter(Boolean))]
    : [sess.unitId];
  sess.promotions = [];
  sess.justGraduatedTopics = [];
  touchedTopics.forEach(uid => {
    if(!uid) return;
    const result = checkAndPromote(uid);
    if(!result) return;
    if(result.type==='promote') sess.promotions.push(result);
    else sess.justGraduatedTopics.push(uid);
  });
  save();
  renderSession();
}

function renderResult(el){
  const total = sess.steps.filter(s=>s.type==='q').length;
  const pct = total ? Math.round(100*sess.correct/total) : 100;
  const promoBanner = (sess.promotions||[]).map(p => `
      <div class="card" style="margin-bottom:14px;border-color:var(--coral);background:var(--coral-soft);text-align:center">
        <div class="eyebrow" style="color:var(--coral-active)">LEVEL UP</div>
        <div style="font-family:var(--serif);font-size:19px;font-weight:700;margin-top:4px">축하합니다! 이제 ${STAGE_LABEL[p.to]} 단계를 공부하실 수 있어요</div>
        <p style="font-size:12.5px;color:var(--ink-soft);margin-top:6px">${esc(unitName(p.uid))} 주제의 ${STAGE_LABEL[p.from]} 단계를 완주했어요.</p>
      </div>`).join('');
  const gradBanner = (sess.justGraduatedTopics||[]).map(uid => `
      <div class="card" style="margin-bottom:14px;border-color:var(--coral);background:var(--coral-soft);text-align:center">
        <div class="eyebrow" style="color:var(--coral-active)">TOPIC COMPLETE</div>
        <div style="font-family:var(--serif);font-size:19px;font-weight:700;margin-top:4px">${esc(unitName(uid))} 완주를 축하합니다!</div>
        <p style="font-size:12.5px;color:var(--ink-soft);margin-top:6px">${STAGE_LABEL[S.topicStage[uid]||'ug']} 단계까지 모두 마쳤어요. 복습은 계속 이어집니다.</p>
      </div>`).join('');
  el.innerHTML = `
    <div class="sess-top"><button class="sess-close" onclick="closeSession()" aria-label="닫기">×</button><div class="sess-track"><i style="width:100%"></i></div></div>
    <div class="sess-body">
      ${promoBanner}
      ${gradBanner}
      <div class="result-hero">
        <div class="big">${sess.correct}<span style="font-size:26px;color:var(--ink-faint)">/${total}</span></div>
        <div class="sub">${pct>=85?'훌륭해요. 빨간펜이 심심했네요':pct>=60?'좋아요. 틀린 건 내일 다시 만나요':'괜찮아요. 복습이 알아서 챙겨줄 거예요'}</div>
      </div>
      <div class="result-list">
        <div class="result-row"><span>연속 학습</span><b>${S.streak}일</b></div>
        <div class="result-row"><span>내일 복습 예정</span><b>${Object.values(S.srs).filter(v=>v.due===S.day+1).length}문제</b></div>
        <div class="result-row"><span>6개월 후 복습 예정</span><b>${Object.values(S.srs).filter(v=>v.graduated).length}문제</b></div>
      </div>
    </div>
    <div class="sess-foot">
      ${(() => {
        if(sess.isCardReview){
          return `<button class="btn btn-primary" onclick="backToBrowseList()">다른 개념 보기</button>`;
        }
        const remaining = sess.isReview ? dueQuestions().length : 0;
        if(remaining){
          return `<button class="btn btn-primary" onclick="startReview()" style="margin-bottom:8px">복습 ${remaining}개 더 남음 · 계속하기</button>
             <button class="btn btn-ghost" onclick="closeSession()">그만하기</button>`;
        }
        if((sess.justGraduatedTopics||[]).length){
          return `<button class="btn btn-primary" onclick="closeSessionToExplore('${sess.justGraduatedTopics[0]}')">다음 주제 고르기</button>`;
        }
        return `<button class="btn btn-primary" onclick="closeSession()">완료</button>`;
      })()}
    </div>`;

  triggerMathRender(el);
}
/* 주제 완주 직후 '완료'를 누르면 탐색 탭으로 자동 이동해 다음 주제를 바로 고를 수 있게 한다 */
function closeSessionToExplore(uid){
  const dom = topicDomain(uid);
  postCloseAction = () => {
    if(dom) exploreDomain = dom;
    setTab('explore');
    toast('주제를 완주하셨습니다! 다음 주제를 골라 주세요.');
  };
  closeSession();
}

/* ============================================================
   메인 화면들
   ============================================================ */
let tab = 'home';

function topicStarted(topicId){
  for(const qId in S.qMeta){ if((S.qMeta[qId]||{}).topic===topicId) return true; }
  return false;
}
/* 현재 학습 중인 단계 안에서의 진행률(%) — 완주하면 자동 승급되므로
   '전체 100%'가 아니라 '지금 단계 100%'가 그 단계 완주를 뜻한다. */
function unitProgress(uid){
  const qs = QUESTIONS[uid];
  if(!qs || !qs.length) return topicStarted(uid) ? 1 : 0;   // 미로딩: 시작 여부만
  if(S.graduatedTopics[uid]) return 100;
  const stage = currentStage(uid);
  const stageQs = qs.filter(q=>q.stage===stage);
  if(!stageQs.length) return topicStarted(uid) ? 1 : 0;
  const done = stageQs.filter(q=>S.attempts[nsKey(uid,q.id)]).length;
  return Math.round(100*done/stageQs.length);
}
function domainProgress(did){
  const ready = allTopics(did).filter(t=>t.ready);
  if(!ready.length) return 0;
  const started = ready.filter(t=>topicStarted(t.id)).length;
  return Math.round(100*started/ready.length);
}
/* 과목별 '다음 주제': 커리큘럼 순서상 아직 완주하지 않은 첫 주제
   (전체 주제 개수는 일부러 노출하지 않는다 — 콘텐츠가 계속 늘어나는데 'N/18'처럼
   고정된 숫자로 보이면 오히려 주제가 한정돼 보인다. 표시는 주제 내 진행률만.) */
function nextTopicInfo(did){
  const ready = allTopics(did).filter(t=>t.ready);
  if(!ready.length) return null;
  const topic = ready.find(t=>!S.graduatedTopics[t.id]);
  if(!topic) return {done:true};
  return {done:false,topic};
}

function attendanceCalendar(){
  const streak = attendanceStreak();
  const best = bestStreak();
  const total = totalStudyDays();
  const WD = ['일','월','화','수','목','금','토'];
  const today = new Date();
  let dots = '';
  for(let i=13;i>=0;i--){
    const d = new Date(today); d.setDate(today.getDate()-i);
    const key = ymd(d);
    const studied = !!S.studyDates[key];
    const isToday = i===0;
    dots += `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1">
      <span style="font-size:9px;color:var(--ink-faint)">${WD[d.getDay()]}</span>
      <span title="${key}" style="width:16px;height:16px;border-radius:5px;
        background:${studied?'var(--redpen)':'var(--paper)'};
        border:1.5px solid ${isToday?'var(--ink)':(studied?'var(--redpen)':'var(--line)')};
        display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff">${studied?'✓':''}</span>
      <span style="font-size:8px;color:var(--ink-faint)">${d.getDate()}</span>
    </div>`;
  }
  return `
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px">
        <div style="display:flex;align-items:baseline;gap:8px">
          <span class="streak-num" style="font-size:38px">${streak}</span>
          <span class="streak-label">일 연속 학습</span>
        </div>
        <div style="text-align:right;font-size:12px;color:var(--ink-soft);line-height:1.5">
          <div>최고 <b class="mono" style="color:var(--ink)">${best}</b>일</div>
          <div>총 <b class="mono" style="color:var(--ink)">${total}</b>일 학습</div>
        </div>
      </div>
      <div style="display:flex;gap:2px;padding-top:4px;border-top:1px solid var(--line)">${dots}</div>
    </div>`;
}

function renderHome(){
  const dueList = dueQuestions();
  const due = dueList.length;
  const domainSpots = DOMAINS.map(d=>({d, info:nextTopicInfo(d.id)}));
  const spotlight = domainSpots.find(x=>x.info && !x.info.done) || domainSpots.filter(x=>x.info).pop();
  if(spotlight && spotlight.info && !spotlight.info.done){
    const tid = spotlight.info.topic.id;
    if(!QUESTIONS[tid]) ensureLoaded([tid]).then(()=>{ if(tab==='home') render(); });
  }
  const upcoming = Object.entries(S.srs).filter(([id,v])=>v.due>S.day);
  const byDay = {};
  upcoming.forEach(([id,v])=>{ byDay[v.due] = (byDay[v.due]||0)+1; });
  const wrongIds = Object.keys(S.attempts).filter(id=>{ const a=S.attempts[id]; return a.tries>a.correct; });

  return `
    <span class="eyebrow">TODAY</span>
    <div style="display:flex;align-items:baseline;gap:9px;margin:2px 0 6px">
      <h1 style="margin:0;font-family:var(--serif);font-size:27px;font-weight:700;letter-spacing:-.01em;color:var(--ink)">하루사이</h1>
      <span style="font-family:Georgia,'Times New Roman',serif;font-style:italic;font-size:15px;color:var(--coral-active);letter-spacing:0">Haru-Sci</span>
    </div>
    <p style="font-size:13.5px;color:var(--ink-soft);margin-bottom:18px">현대인을 위한 최소한의 과학 교양</p>
    ${attendanceCalendar()}

        <div style="display:flex;align-items:center;gap:8px;margin:12px 0 4px">

          <div style="display:flex;gap:4px">
            ${[1,2,3,4].map(n=>`<button class="chip" style="cursor:pointer;padding:3px 9px;border:1px solid ${S.cardsPerSession===n?'var(--redpen)':'var(--line)'};background:${S.cardsPerSession===n?'var(--redpen)':'transparent'};color:${S.cardsPerSession===n?'#fff':'var(--ink-soft)'}" onclick="setCardsPerSession(${n})">${n}장</button>`).join('')}

        <button class="btn btn-red" onclick="startSession('${tid}')">오늘의 세션 시작 · 5분</button>
      `; })() : `
        <p style="font-size:14.5px;color:var(--ink-soft);margin:8px 0 14px">모든 과목의 주제를 완주했어요 🎉 복습으로 감각을 유지해 보세요.</p>
        <button class="btn btn-ghost" onclick="setTab('explore')">주제 둘러보기</button>
      `}
    </div>

    <div class="section-label">과목별 진행 · 내 수준</div>
    ${(Object.keys(S.diagDone).length===0 && !S.diagBannerDismissed) ? `<div class="card" style="margin-bottom:10px;border-color:var(--coral);background:var(--coral-soft)">
      <b style="font-size:14px;color:var(--coral-active)">3분이면 충분해요 — 먼저 수준을 진단해 보세요</b>
      <p style="font-size:13px;color:var(--ink-soft);margin:4px 0 0">과목마다 우측의 <b>진단</b>을 누르면 ${STAGE_LABEL.hs} 기준 성취도에 따라 ${STAGE_LABEL.ms}/${STAGE_LABEL.ug} 단계로 자동 유도 분기하여 맞춤형 수준을 설정해줍니다. 헤매지 않고 딱 맞는 난이도부터 시작할 수 있어요.</p>
      <button class="chip" style="cursor:pointer;margin-top:10px;border:1px solid var(--line);background:transparent;color:var(--ink-faint)" onclick="confirmSkipDiagnostic()">진단 건너뛰기</button>
    </div>` : ''}
    <div class="domain-list">

              <span class="chip" style="background:var(--paper);border:1px solid var(--line);color:${d.color};font-size:11px;margin-left:2px">${STAGE_LABEL[stage]}</span>
            </div>
            ${nextLabel ? `<div class="domain-next">${nextLabel}</div>` : ''}
            <div class="progress-bar"><div class="progress-fill" style="width:${p}%;background:${d.color}"></div></div>
          </div>
          <button class="chip" style="cursor:pointer;border:1px solid var(--coral);background:var(--card);color:var(--coral-active);font-weight:600" onclick="event.stopPropagation();startDiagnostic('${d.id}')">진단</button>

    <div class="section-label">복습</div>
