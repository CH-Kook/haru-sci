      ? `<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:10px">${Object.entries(byDay).sort((a,b)=>a[0]-b[0]).map(([day,n])=>`<div class="result-row"><span>Day ${day} (${day-S.day}일 뒤)</span><b>${n}문제</b></div>`).join('')}</div>`
      : `<p style="font-size:13.5px;color:var(--ink-faint);margin-bottom:10px">아직 예정된 복습이 없어요. 세션을 시작하면 여기에 쌓입니다.</p>`}
    ${wrongIds.length ? `<details style="margin-bottom:6px">
      <summary style="cursor:pointer;font-size:13.5px;color:var(--ink-soft)">틀린 적 있는 문제 ${wrongIds.length}개</summary>
      <div style="margin-top:8px">${wrongIds.map(id=>{ const v=S.srs[id]||{};
        return `<div class="wrong-item">${esc(qText(id))}<div class="w-due">${v.due!=null?'다음 복습: Day '+v.due:''}</div></div>`; }).join('')}</div>
    </details>` : ''}`;
}

let exploreDomain = 'physics';
function goExplore(did){ exploreDomain = did; setTab('explore'); }

let exploreTag = null;   // 선택된 태그 (null=전체)

function domainMeta(did){ return DOMAINS.find(x=>x.id===did); }

function topicCard(t){
  const d = domainMeta(t.domain);
  const cur = currentStage(t.id);
  const tagHtml = t.tags.map(tag=>`<span onclick="event.stopPropagation();pickTag('${tag}')" style="cursor:pointer;font-size:12px;color:${exploreTag===tag?'#fff':'var(--ink-faint)'};background:${exploreTag===tag?d.color:'var(--paper)'};border:1px solid var(--line);border-radius:99px;padding:1px 8px">#${tag}</span>`).join(' ');
  const stageBadges = (t.stages||[]).map(s=>`<button onclick="event.stopPropagation();pickTopicStage('${t.id}','${s}')" style="cursor:pointer;font-family:inherit;font-size:11px;padding:0 6px;border-radius:99px;border:1px solid ${s===cur?d.color:'var(--line)'};color:${s===cur?'#fff':'var(--ink-faint)'};background:${s===cur?d.color:'transparent'}">${STAGE_LABEL[s]}</button>`).join(' ');
  /* 진행 상황: 완주 여부는 항상 정확(로컬 저장), 진행률(%)은 이 주제 문제가 이미 로드된 경우에만 실측치 표시 */
  const graduated = !!S.graduatedTopics[t.id];
  const started = topicStarted(t.id);
  const loaded = QUESTIONS[t.id] && QUESTIONS[t.id].length;
  const pct = loaded ? unitProgress(t.id) : null;
  const head = t.ready
    ? `onclick="startSession('${t.id}')" class="unit-item" style="flex-wrap:wrap"`
    : `class="unit-item locked" style="flex-wrap:wrap"`;
  const statusBadge = !t.ready
    ? `<span class="chip badge-soon">준비 중</span>`
    : graduated
      ? ''
      : started
        ? `<span class="chip badge-ready">${STAGE_LABEL[cur]} 학습 중${pct!=null?` · ${pct}%`:''}</span>`
        : `<span class="chip badge-ready">학습</span>`;
  return `<div ${head}>
    ${graduated ? `<div class="topic-stamp">완주</div>` : ''}
    <div style="display:flex;align-items:center;gap:10px;width:100%">
      <span class="domain-dot" style="background:${t.ready?d.color:'var(--line)'}"></span>
      <span class="u-name" style="flex:1">${t.title}</span>
      ${exploreDomain==='all'?`<span class="chip" style="background:var(--paper);color:${d.color};border:1px solid var(--line)">${d.name}</span>`:''}
      <span class="u-count">${LEVEL_LABEL[t.level]}</span>
      ${statusBadge}
    </div>
    ${pct!=null && started && !graduated ? `<div class="progress-bar" style="margin:6px 0 0 20px"><div class="progress-fill" style="width:${pct}%;background:${d.color}"></div></div>` : ''}
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding-left:20px;margin-top:7px">
      ${stageBadges?`<span style="display:flex;gap:4px">${stageBadges}</span>`:''}
      <span style="display:flex;gap:5px;flex-wrap:wrap">${tagHtml}</span>
    </div>
  </div>`;
}

function pickTag(tag){ exploreTag = (exploreTag===tag)?null:tag; render(); }
function pickTopicStage(topicId, stage){
  if(currentStage(topicId) === stage) return;
  showConfirm(`
    <h3>${STAGE_LABEL[stage]} 단계로 바꿀까요?</h3>
    <p>${esc(unitName(topicId))}의 학습 단계가 <b>${STAGE_LABEL_TO[stage]}</b> 바뀝니다.</p>
    <div class="confirm-actions">
      <button class="btn btn-ghost" style="flex:1" onclick="hideConfirm()">취소</button>
      <button class="btn btn-primary" style="flex:1" onclick="confirmPickTopicStage('${topicId}','${stage}')">바꾸기</button>
    </div>`);
}
function confirmPickTopicStage(topicId, stage){
  hideConfirm();
  setTopicStage(topicId, stage);
  toast(`${STAGE_LABEL[stage]} 단계로 바꿨어요`);
  render();
}

function renderExplore(){
  let topics = allTopics(exploreDomain);
  if(exploreTag) topics = topics.filter(t=>t.tags.includes(exploreTag));

  const domainChips = [{id:'all',name:'전체',color:'var(--ink)'}, ...DOMAINS].map(x=>
    `<button class="chip" style="cursor:pointer;padding:6px 13px;border:1px solid ${x.id===exploreDomain?x.color:'var(--line)'};background:${x.id===exploreDomain?x.color:'var(--card)'};color:${x.id===exploreDomain?'#fff':'var(--ink-soft)'}" onclick="goExplore('${x.id}')">${x.name}</button>`
  ).join('');

  const tagChips = allTags().map(tag=>
    `<button class="chip" style="cursor:pointer;flex-shrink:0;border:1px solid ${exploreTag===tag?'var(--redpen)':'var(--line)'};background:${exploreTag===tag?'var(--redpen)':'var(--card)'};color:${exploreTag===tag?'#fff':'var(--ink-faint)'}" onclick="pickTag('${tag}')">#${tag}</button>`
  ).join('');

  /* 특정 과목 선택 시 안내 바 — 단계는 더 이상 수동으로 고르지 않는다.
     진단이 시작 단계를 정하고, 주제마다 완주하면 자동으로 다음 단계로 승급된다. */
  let stageBar = '';
  if(exploreDomain!=='all'){
    const startStage = S.subjectStage[exploreDomain]||'ms';
    stageBar = `<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:12px;color:var(--ink-soft)">
      <span>진단 시작 단계 <b style="color:var(--ink)">${STAGE_LABEL[startStage]}</b> · 주제별로 완주하면 자동 승급돼요</span>
      <button class="chip" style="cursor:pointer;margin-left:auto;border:1px solid var(--line);background:var(--card);color:var(--ink-soft)" onclick="startDiagnostic('${exploreDomain}')">다시 진단</button>
    </div>`;
  }

  return `
    <span class="eyebrow">EXPLORE</span>
    <h1 class="screen-title">탐색</h1>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">${domainChips}</div>
    ${stageBar}
    <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:6px;-webkit-overflow-scrolling:touch">${tagChips}</div>
    ${exploreTag?`<div style="font-size:12px;color:var(--ink-soft);margin:6px 0 14px">#${exploreTag} · ${topics.length}개 주제 <button onclick="pickTag('${exploreTag}')" style="background:none;border:none;color:var(--redpen);cursor:pointer;font-family:inherit;font-size:12px;text-decoration:underline">필터 해제</button></div>`:`<div style="height:8px"></div>`}
    <div class="topic-grid" style="display:flex;flex-direction:column;gap:8px">
      ${topics.length?topics.map(topicCard).join(''):`<p style="font-size:13px;color:var(--ink-faint);padding:20px 0;text-align:center">해당하는 주제가 없어요.</p>`}
    </div>`;
}

let drillSubject = 'all';
let drillStage = 'all';
let drillCount = 20;
function pickDrillSubject(id){ drillSubject = id; render(); }
function pickDrillStage(s){ drillStage = s; render(); }
function pickDrillCount(n){ drillCount = n; render(); }

function renderDrill(){
  const subjectChips = [{id:'all',name:'전체',color:'var(--ink)'}, ...DOMAINS].map(x=>{
    const ready = x.id==='all' || !!SUENUNG_BANKS[x.id];
    if(!ready) return `<button class="chip" disabled style="cursor:default;padding:6px 13px;border:1px solid var(--line);background:var(--paper);color:var(--ink-faint)">${x.name} · 준비 중</button>`;
    return `<button class="chip" style="cursor:pointer;padding:6px 13px;border:1px solid ${x.id===drillSubject?x.color:'var(--line)'};background:${x.id===drillSubject?x.color:'var(--card)'};color:${x.id===drillSubject?'#fff':'var(--ink-soft)'}" onclick="pickDrillSubject('${x.id}')">${x.name}</button>`;
  }).join('');
  const stageChips = ['all', ...STAGE_ORDER].map(s=>
    `<button class="chip" style="cursor:pointer;border:1px solid ${s===drillStage?'var(--coral)':'var(--line)'};background:${s===drillStage?'var(--coral)':'var(--card)'};color:${s===drillStage?'#fff':'var(--ink-soft)'}" onclick="pickDrillStage('${s}')">${s==='all'?'전체':STAGE_LABEL[s]}</button>`
  ).join('');
  const countChips = [10,20,30].map(n=>
    `<button class="chip" style="cursor:pointer;border:1px solid ${n===drillCount?'var(--coral)':'var(--line)'};background:${n===drillCount?'var(--coral)':'var(--card)'};color:${n===drillCount?'#fff':'var(--ink-soft)'}" onclick="pickDrillCount(${n})">${n}문제</button>`
  ).join('');

  return `
    <span class="eyebrow">QUICK PRACTICE</span>
    <h1 class="screen-title">문제풀기</h1>
    <p style="font-size:14px;color:var(--ink-soft);margin:-8px 0 18px">개념 카드 없이, 수능형으로 새로 쓴 문제만 몰아서 풀어요. 조건을 고르고 바로 시작하세요.</p>

    <div class="card" style="margin-bottom:14px">
      <div class="section-label" style="margin-top:0">과목</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">${subjectChips}</div>
      <div class="section-label">난이도</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">${stageChips}</div>
      <div class="section-label">문항 수</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">${countChips}</div>
      <button class="btn btn-red" onclick="startDrill()">문제풀기 시작</button>
    </div>`;
}

function unlockHint(st){
  const u = st.unlock||{}; const names = (u.scope||[]).map(unitName).join(', ');
  if(u.type==='topicsStarted') return `${names} 학습을 시작하면 열려요`;
  if(u.type==='correctInTopic') return `${names}에서 문제 ${u.count||1}개를 맞히면 열려요`;
  return '조건 미정';
}
function renderStories(){
  if(!STORIES.length) return `
    <span class="eyebrow">SCIENCE STORIES</span>
    <h1 class="screen-title">이야기</h1>
    <p style="font-size:13px;color:var(--ink-faint)">아직 이야기가 없어요.</p>`;
  const totalUnlocked = STORIES.filter(storyUnlocked).length;
  const card = (st, isOpen) => {
    const d = DOMAINS.find(x=>x.id===st.subject) || {color:'var(--ink)', name:''};
    if(isOpen){
      const unread = !S.readStories[st.id];
      return `<div class="unit-item" style="flex-direction:column;align-items:flex-start;gap:6px" onclick="openStory('${st.id}')">
        <div style="display:flex;align-items:center;gap:8px;width:100%">
          <span class="domain-dot" style="background:${d.color}"></span>
          <span class="u-name" style="flex:1;font-weight:600">${st.title}</span>
          ${unread?`<span class="chip" style="background:var(--redpen);color:#fff">NEW</span>`:`<span class="collect-stamp">수집 완료</span>`}
          <span class="chip badge-ready">읽기</span>
        </div>
        <p style="font-size:12.5px;color:var(--ink-soft);padding-left:20px;margin:0">${st.teaser||''}</p>
      </div>`;
    }
    return `<div class="unit-item locked" style="flex-direction:column;align-items:flex-start;gap:6px">
      <div style="display:flex;align-items:center;gap:8px;width:100%">
        <span style="font-size:13px">🔒</span>
        <span class="u-name" style="flex:1">${st.title}</span>
        <span class="chip badge-soon">잠김</span>
      </div>
      <p style="font-size:12px;color:var(--ink-faint);padding-left:20px;margin:0">${unlockHint(st)}</p>
    </div>`;
  };
  const sections = DOMAINS.map(d=>{
    const own = STORIES.filter(s=>s.subject===d.id);
    if(!own.length) return '';
    const unlocked = own.filter(storyUnlocked);
    const locked = own.filter(s=>!storyUnlocked(s));
    return `<details class="story-domain"${unlocked.length?' open':''}>
      <summary>
        <span class="domain-dot" style="background:${d.color}"></span>
        <span style="flex:1;font-weight:600;font-size:14px">${d.name}</span>
        <span class="chip" style="background:var(--paper);border:1px solid var(--line);font-size:11px">${unlocked.length}/${own.length}</span>
      </summary>
      <div class="story-domain-body" style="display:flex;flex-direction:column;gap:8px">
        ${unlocked.map(s=>card(s,true)).join('')}
        ${locked.map(s=>card(s,false)).join('')}
      </div>
    </details>`;
  }).join('');
  return `
    <span class="eyebrow">SCIENCE STORIES</span>
    <h1 class="screen-title">이야기</h1>
    <p style="font-size:13px;color:var(--ink-soft);margin-bottom:16px">학습이 쌓이면 그 수준에서 이해할 수 있는 과학 이야기가 열립니다.</p>
    ${totalUnlocked ? '' : `<p style="font-size:13px;color:var(--ink-faint);margin-bottom:12px">아직 열린 이야기가 없어요. 학습을 시작해 보세요.</p>`}
    ${sections}`;
}

    <div style="margin:-8px 0 16px;display:flex;gap:14px">
      <a href="/guide.html" style="font-size:13px;color:var(--ink-faint);text-decoration:underline">사용법 안내 보기 →</a>
      <a href="/privacy.html" style="font-size:13px;color:var(--ink-faint);text-decoration:underline">개인정보처리방침</a>

    <div class="stat-grid">
      <div class="stat-cell"><b>${acc}%</b><span>전체 정답률</span></div>

      <span style="font-size:13px;color:var(--ink-soft)">버튼음·채점음 켜기</span>
      <button class="chip" style="cursor:pointer;padding:5px 14px;border:1px solid ${S.soundOn!==false?'var(--redpen)':'var(--line)'};background:${S.soundOn!==false?'var(--redpen)':'transparent'};color:${S.soundOn!==false?'#fff':'var(--ink-soft)'}" onclick="toggleSound()">${S.soundOn!==false?'켜짐':'꺼짐'}</button>
    </div>
    <div class="section-label">신고한 문제 (${S.reports.length})</div>
    ${S.reports.length
      ? S.reports.map(r=>`<div class="wrong-item">${esc(qText(r.qId))}<div class="w-due" style="color:var(--ink-faint)">Day ${r.day} 신고</div></div>`).join('')
      : `<p style="font-size:13px;color:var(--ink-faint)">신고한 문제가 없어요. 문제 해설 아래 버튼으로 신고할 수 있습니다.</p>`}
    <div class="section-label">데이터 백업 · 기기 이동</div>
    <div class="card">
      <p style="font-size:13px;color:var(--ink-soft);margin-bottom:12px;line-height:1.6">진도는 이 브라우저에만 저장돼요. 다른 기기로 옮기고 싶으면 코드 하나로 가장 빠르게 옮길 수 있어요.</p>
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <button class="btn btn-primary" onclick="sendBackupCode()" style="flex:1">코드로 보내기</button>
        <button class="btn btn-red" onclick="showReceiveCodeBox()" style="flex:1">코드로 받기</button>
      </div>
      <div id="backupCodeDisplay" style="text-align:center;margin:6px 0"></div>
      <div id="receiveCodeBox" style="display:none;margin-top:8px">
        <input type="text" id="receiveCodeInput" placeholder="다른 기기에 뜬 코드를 입력 (예: 가나다라1234)" style="width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;font-family:'IBM Plex Mono',monospace;font-size:14px;color:var(--ink);margin-bottom:8px;text-align:center">
        <button class="btn btn-red" onclick="receiveBackupCode()" style="width:100%">가져오기 (현재 진도를 덮어씁니다)</button>
      </div>
      <p style="font-size:12px;color:var(--ink-faint);margin-top:8px">코드는 10분 동안만 유효하고, 한 번 쓰면 바로 사라져요.</p>
      <details style="margin-top:12px">
        <summary style="cursor:pointer;font-size:12.5px;color:var(--ink-faint)">파일로 따로 보관해두기</summary>
        <div style="margin-top:10px">
          <p style="font-size:12.5px;color:var(--ink-faint);margin-bottom:8px">기기를 옮길 때보다는, 브라우저 데이터를 지우기 전에 안전하게 따로 저장해두고 싶을 때 씁니다.</p>
          <div style="display:flex;gap:8px">
            <button class="btn btn-ghost" onclick="downloadBackup()" style="flex:1">파일로 저장</button>
            <button class="btn btn-ghost" onclick="document.getElementById('importFile').click()" style="flex:1">파일에서 가져오기</button>
          </div>
          <input type="file" id="importFile" accept=".json,application/json" style="display:none" onchange="importFromFile(this)">
        </div>
      </details>
    </div>
    ${DEV_MODE ? `<div class="section-label">개발자 도구</div>
    <div class="card">
      <button class="btn btn-ghost" onclick="devNextDay()" style="margin-bottom:8px">하루 넘기기 (현재 Day ${S.day})</button>
      <button class="btn btn-ghost" onclick="devFillAttendance()" style="margin-bottom:8px">출석 달력 예시 채우기</button>
      <button class="btn btn-ghost" onclick="devReset()">모든 데이터 초기화</button>
      <p class="dev-note">간격 반복이 실제로 작동하는지 확인하는 용도입니다. 하루를 넘기면 복습 예정 문제가 오늘의 세션에 등장합니다. 실제 배포판에서는 이 도구를 제거하고 실제 날짜를 사용합니다.</p>
    </div>` : ''}`;
}

/* ── 백업 내보내기/가져오기 ──────────────────────────────
   서버 없이 기기 간 진도 이동. 버전 태그를 붙여 향후 호환성 확보. */
const BACKUP_VERSION = 1;
function exportString(){
  return JSON.stringify({ _app:'haru-sci', _v:BACKUP_VERSION, _at:new Date().toISOString(), state:S });
}
function downloadBackup(){
  const data = exportString();
  try {
    const blob = new Blob([data], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `haru-science-backup-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 1000);
    toast('파일로 저장했어요');
  } catch(e){
    toast('저장이 막혀 있어요. 브라우저 설정을 확인해주세요');
  }
}
/* 백업 코드 문자열(텍스트 붙여넣기 또는 파일 내용)을 검증해 현재 상태에 반영. 성공 시 true. */
function applyImportedBackup(raw){
  if(!raw || !raw.trim()){ toast('가져올 백업 코드가 없어요'); return false; }
  let parsed;
  try { parsed = JSON.parse(raw.trim()); }
  catch(e){ toast('코드 형식이 올바르지 않아요'); return false; }
  const incoming = parsed && parsed.state ? parsed.state : parsed;   // 순수 state도 허용
  if(!incoming || typeof incoming !== 'object' || !('srs' in incoming) || !('stats' in incoming)){
    toast('하루사이 백업 코드가 아니에요'); return false;
  }
  /* 누락 필드 기본값 보강 */
  S = Object.assign(
    {day:0,streak:0,lastStudyDay:-1,seenCards:{},srs:{},attempts:{},stats:{answered:0,correct:0},reports:[],storyReports:[],qMeta:{},subjectStage:{physics:'ms',chem:'ms',bio:'ms',earth:'ms'},topicStage:{},diagDone:{},diagBannerDismissed:false,graduatedTopics:{},readStories:{},studyDates:{}},
    incoming
  );
  S.subjectStage = Object.assign({physics:'ms',chem:'ms',bio:'ms',earth:'ms'}, S.subjectStage||{});
  if(!S.topicStage) S.topicStage = {};
  S.pendingSession = null;   // 기기 이동 직후엔 진행 중이던 세션을 이어할 수 없으니 비운다
  if(!S.qMeta) S.qMeta = {}; if(!S.diagDone) S.diagDone={}; if(!S.graduatedTopics) S.graduatedTopics={}; if(!S.storyReports) S.storyReports=[]; if(!S.readStories) S.readStories={}; if(!S.studyDates) S.studyDates={};
  migrateNamespacedKeys();
  save(); render();
  toast('진도를 가져왔어요');
  return true;
}
function importFromFile(input){
  const file = input.files && input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => applyImportedBackup(String(reader.result || ''));
  reader.onerror = () => toast('파일을 읽지 못했어요');
  reader.readAsText(file);
  input.value = '';
}

/* ── 코드로 기기 간 이동 (Cloudflare KV에 10분간 임시 저장) ──────
   진도 데이터가 잠깐 서버를 거치는 유일한 경로. 코드를 모르면 접근 불가하고,
   가져가는 즉시 또는 10분 뒤 자동 삭제된다. */
async function sendBackupCode(){
  const el = document.getElementById('backupCodeDisplay');
  el.innerHTML = `<p style="font-size:13px;color:var(--ink-faint)">코드를 만드는 중...</p>`;
  try {
    const res = await fetch('/api/backup', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ data: exportString() }),
    });
    const json = await res.json();
    if(!json.ok){ el.innerHTML = ''; toast('코드를 만들지 못했어요'); return; }
    el.innerHTML = `<div style="font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:700;letter-spacing:.04em;color:var(--coral-active);padding:14px;background:var(--coral-soft);border-radius:12px">${esc(json.code)}</div>
      <p style="font-size:12px;color:var(--ink-faint);margin-top:6px">다른 기기에서 "코드로 받기"에 이 코드를 입력하세요</p>`;
  } catch(e){
    el.innerHTML = '';
    toast('네트워크 오류로 코드를 만들지 못했어요');
  }
}
function showReceiveCodeBox(){
  const box = document.getElementById('receiveCodeBox');
  if(box){ box.style.display = 'block'; document.getElementById('receiveCodeInput').focus(); }
}
async function receiveBackupCode(){
  const input = document.getElementById('receiveCodeInput');
  const code = input && input.value.trim();
  if(!code){ toast('코드를 입력해주세요'); return; }
  try {
    const res = await fetch('/api/backup?code=' + encodeURIComponent(code));
    const json = await res.json();
    if(!json.ok){ toast('코드가 잘못됐거나 만료됐어요'); return; }
    applyImportedBackup(json.data);
  } catch(e){
    toast('네트워크 오류로 가져오지 못했어요');
  }
}

function devNextDay(){ S.day++; save(); render(); toast(`Day ${S.day} — 복습 ${dueQuestions().length}문제 대기 중`); }
function devFillAttendance(){
  const today=new Date();
  [0,1,2,3,5,6,9,10,12].forEach(back=>{ const d=new Date(today); d.setDate(today.getDate()-back); S.studyDates[ymd(d)]=true; });
  S.streak=attendanceStreak(); save(); render(); toast('출석 예시를 채웠어요');
}
function devReset(){
  S = {day:0,streak:0,lastStudyDay:-1,seenCards:{},srs:{},attempts:{},stats:{answered:0,correct:0},reports:[],storyReports:[],qMeta:{},subjectStage:{physics:'ms',chem:'ms',bio:'ms',earth:'ms'},diagDone:{},diagBannerDismissed:false,graduatedTopics:{},readStories:{},studyDates:{}};
  save(); render(); toast('초기화했어요');
}

/* ============================================================
   라우터
   ============================================================ */
function setTab(t){
  tab = t;
  document.querySelectorAll('#tabbar button').forEach(b=>b.classList.toggle('active', b.dataset.tab===t));
  render();
}
function render(){
  const map = {home:renderHome, explore:renderExplore, drill:renderDrill, stories:renderStories, stats:renderStats};
  $('#screen').innerHTML = map[tab]();
  window.scrollTo(0,0);
  
  // 메인 탭 화면 전환 시 수식 렌더링 격발
  triggerMathRender($('#screen'));
}
document.querySelectorAll('#tabbar button').forEach(b=>b.addEventListener('click',()=>setTab(b.dataset.tab)));

async function init(){
  $('#screen').innerHTML = `<div style="padding:70px 0;text-align:center;color:var(--ink-faint);font-size:14px">불러오는 중…</div>`;
  try {
    await loadIndex();
    await loadStoriesIndex();
  } catch(e){
    $('#screen').innerHTML = `<div class="card" style="margin-top:40px">
      <b style="font-size:15px">콘텐츠를 불러오지 못했어요</b>
      <p style="font-size:13.5px;color:var(--ink-soft);margin-top:10px;line-height:1.7">이 앱은 <code>data</code> 폴더의 JSON을 불러옵니다. HTML 파일을 더블클릭해서 여는 방식(<code>file://</code>)은 브라우저 보안정책 때문에 막힙니다.<br><br>다음 중 하나로 열어주세요:</p>
      <ul style="font-size:13.5px;color:var(--ink-soft);line-height:1.9;margin:8px 0 0 18px">
        <li>폴더에서 <code>python -m http.server</code> 실행 후 <code>localhost:8000</code> 접속</li>
        <li>GitHub Pages 등 웹 호스팅에 올리기</li>
      </ul>
      <p style="font-size:12px;color:var(--ink-faint);margin-top:12px">오류: ${esc(String(e.message||e))}</p>
    </div>`;
    return;
  }
  render();
}
init();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
