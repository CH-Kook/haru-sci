<style>
@font-face{

  font-weight:700; font-style:normal; font-display:swap;
}
/* ============================================================
   하루과학 디자인 토큰
   콘셉트: 모눈종이 실험 노트 + 빨간펜 채점
   ============================================================ */
:root{
  --paper:#FAF6EE;        /* 따뜻한 크림 노트 캔버스 */
  --grid:rgba(150,120,86,0.07);   /* 따뜻한 갈색 모눈선 */
  --ink:#2B2823;          /* 따뜻한 잉크(차콜 브라운) */
  --ink-soft:#6C6459;
  --ink-faint:#A89F90;
  --line:#E8E0D2;         /* 따뜻한 헤어라인 */
  --redpen:#CB4A3B;       /* 채점 빨간펜 */
  --redpen-soft:#F7E7E1;
  --bluepen:#2F6D8C;      /* 파란펜(청록빛) */
  --bluepen-soft:#E7F0F2;
  --card:#FFFCF6;         /* 따뜻한 카드 */
  --shadow:0 1px 2px rgba(70,52,32,.05), 0 8px 22px rgba(70,52,32,.06);
  --r:14px;
  /* Claude 코랄 계열 강조 */
  --coral:#CC785C; --coral-active:#A9583E; --coral-soft:#F3E4DB;
  --cream-card:#F1E9DB;   /* 코지한 크림 블록 */
  --good:#4E9A63; --good-soft:#E7F1E7;   /* 정답 공개(성공) */
  --serif:'Noto Serif KR',Georgia,'Apple SD Gothic Neo','Laundry Gothic',serif;
  /* 영역 색 (크림 위에서 조화되도록 살짝 warm) */
  --d-space:#6E5FBE; --d-life:#4B9A63; --d-matter:#C0762C;
  --d-physics:#39749E; --d-earth:#45949F; --d-think:#94569F;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Laundry Gothic',-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  color:var(--ink);
  background:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px),
    var(--paper);
  background-size:22px 22px, 22px 22px, auto;
  font-size:17px;
  line-height:1.62;
  word-break:keep-all;
  overflow-wrap:break-word;
}
.mono{font-family:'IBM Plex Mono',monospace}

/* ---------- 앱 프레임 ---------- */
#app{
  max-width:430px;margin:0 auto;min-height:100dvh;
  display:flex;flex-direction:column;position:relative;
  background:transparent;
}
#screen{flex:1;padding:20px 18px 96px;overflow-x:hidden}

/* ---------- 공통 요소 ---------- */
.eyebrow{
  font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;
  letter-spacing:.14em;color:var(--ink-faint);text-transform:uppercase;
}
h1.screen-title{font-family:var(--serif);font-size:26px;font-weight:700;letter-spacing:-.01em;margin:2px 0 18px}
.card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  box-shadow:var(--shadow);padding:18px;
}
.btn{
  display:block;width:100%;border:none;border-radius:12px;cursor:pointer;
  font-family:inherit;font-size:16px;font-weight:600;padding:15px;
  transition:transform .06s ease, background .15s ease;
}
.btn:active{transform:scale(.985)}
.btn-primary{background:var(--coral);color:#fff}
.btn-primary:active{background:var(--coral-active)}
.btn-primary:disabled{background:var(--ink-faint);cursor:default}
.btn-ghost{background:transparent;color:var(--ink-soft);border:1px solid var(--line)}
.btn-red{background:var(--redpen);color:#fff}
.chip{
  display:inline-flex;align-items:center;gap:5px;border-radius:99px;
  font-size:12px;font-weight:600;padding:3px 10px;
}

/* ---------- 홈 ---------- */
.streak-row{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
.streak-num{font-family:'IBM Plex Mono',monospace;font-size:44px;font-weight:600;color:var(--redpen);line-height:1}
.streak-label{font-size:14px;color:var(--ink-soft);font-weight:500}
.today-card{margin-top:16px}
.today-meta{display:flex;gap:14px;margin:10px 0 16px}
.today-meta .m{flex:1;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
.today-meta .m b{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;display:block}
.today-meta .m span{font-size:12px;color:var(--ink-soft)}
.domain-list{margin-top:22px;display:flex;flex-direction:column;gap:10px}
.domain-row{
  display:flex;align-items:center;gap:12px;background:var(--card);
  border:1px solid var(--line);border-radius:12px;padding:12px 14px;cursor:pointer;
}
.domain-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.domain-name{font-weight:600;font-size:15px;flex:1}
.domain-prog{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-faint)}
.progress-bar{height:4px;background:var(--paper);border-radius:2px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:2px;transition:width .4s ease}

/* ---------- 탐색 ---------- */
.unit-group{margin-bottom:22px}
.unit-group h3{font-size:15px;font-weight:700;margin:0 0 8px;display:flex;align-items:center;gap:8px}
.unit-item{
  display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--card);
  border:1px solid var(--line);border-radius:12px;margin-bottom:8px;cursor:pointer;
}
.unit-item.locked{opacity:.5;cursor:default}
.unit-item .u-name{flex:1;font-size:14px;font-weight:500}
.unit-item .u-count{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-faint)}
.badge-ready{background:var(--coral-soft);color:var(--coral-active)}
.badge-soon{background:var(--paper);color:var(--ink-faint);border:1px solid var(--line)}

/* ---------- 이야기: 과목별 접기/펼치기 ---------- */
.story-domain{border:1px solid var(--line);border-radius:12px;background:var(--card);margin-bottom:10px;overflow:hidden}
.story-domain summary{list-style:none;cursor:pointer;display:flex;align-items:center;gap:8px;padding:14px}
.story-domain summary::-webkit-details-marker{display:none}
.story-domain summary::after{content:'▾';margin-left:2px;color:var(--ink-faint);font-size:12px;transition:transform .15s ease}
.story-domain[open] summary::after{transform:rotate(180deg)}
.story-domain .story-domain-body{padding:0 12px 12px}

/* ---------- 확인 팝업(넛지) ---------- */
.confirm-overlay{
  position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;
  background:rgba(43,40,35,.32);backdrop-filter:blur(2px);padding:20px;
}
.confirm-overlay.show{display:flex}
.confirm-card{
  background:var(--card);border:1px solid var(--line);border-radius:var(--r);
  box-shadow:var(--shadow);max-width:340px;width:100%;padding:20px 20px 16px;
}
.confirm-card h3{font-family:var(--serif);font-size:17px;font-weight:700;margin:0 0 8px}
.confirm-card p{font-size:13.5px;color:var(--ink-soft);line-height:1.55;margin:0 0 18px}
.confirm-card .confirm-actions{display:flex;gap:8px}
.confirm-card .confirm-actions .btn{padding:12px;font-size:14px}

/* ---------- 세션 (풀스크린) ---------- */
#session{
  position:fixed;inset:0;z-index:50;display:none;flex-direction:column;
  max-width:430px;margin:0 auto;
  background:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px),
    var(--paper);
  background-size:22px 22px, 22px 22px, auto;
}
#session.open{display:flex}
.sess-top{display:flex;align-items:center;gap:12px;padding:16px 18px 8px}
.sess-close{background:none;border:none;font-size:22px;color:var(--ink-faint);cursor:pointer;padding:4px;line-height:1}
.sess-track{flex:1;height:6px;background:#E7EAF0;border-radius:3px;overflow:hidden}
.sess-track i{display:block;height:100%;background:var(--bluepen);border-radius:3px;transition:width .3s ease}
.sess-body{flex:1;overflow-y:auto;padding:14px 18px 24px;display:flex;flex-direction:column}
.sess-foot{padding:12px 18px calc(16px + env(safe-area-inset-bottom))}

/* 개념 카드 */
.concept-tag{margin-bottom:10px}
.concept-card{position:relative}
.concept-card h2{font-family:var(--serif);font-size:23px;font-weight:700;letter-spacing:-.005em;margin-bottom:12px}
.concept-card h2::after{content:"";display:block;width:38px;height:3px;background:var(--coral);border-radius:2px;margin-top:9px;opacity:.85}
.concept-card p{font-size:18.5px;line-height:1.8;color:var(--ink)}
.figure{
  margin:14px 0 4px;background:var(--paper);border:1px solid var(--line);
  border-radius:10px;padding:14px;text-align:center;
}
.figure svg{max-width:100%;height:auto}
.figure figcaption{font-size:13.5px;color:var(--ink-soft);margin-top:8px;line-height:1.5}
.q-figure{margin:0 0 16px}
.concept-card .example{
  margin-top:14px;padding:12px 14px;background:var(--cream-card);
  border-left:3px solid var(--coral);border-radius:0 10px 10px 0;
  font-size:15px;color:var(--ink);
}
.concept-card .example b{color:var(--coral-active)}

/* 문제 */
.q-text{font-size:21px;font-weight:600;line-height:1.6;margin-bottom:18px}
.q-text u{text-decoration-line:underline;text-decoration-color:var(--redpen);text-decoration-thickness:2.5px;text-underline-offset:3px}
.collect-stamp{
  display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;
  font-family:var(--serif);font-size:10.5px;font-weight:700;color:var(--redpen);
  border:1.5px solid var(--redpen);border-radius:6px;padding:2px 7px;
  transform:rotate(-7deg);letter-spacing:.03em;background:rgba(203,74,59,.06);
}
.q-level{margin-bottom:10px}
.choice{
  display:block;width:100%;text-align:left;background:var(--card);
  border:1.5px solid var(--line);border-radius:12px;padding:14px 16px;
  font-family:inherit;font-size:18px;font-weight:500;color:var(--ink);
  margin-bottom:10px;cursor:pointer;transition:border-color .12s;
}
.choice:not(:disabled):hover{border-color:var(--ink-faint)}
.choice.picked-right{border-color:var(--redpen);background:#fff}
.choice.picked-wrong{border-color:var(--redpen);background:var(--redpen-soft)}
.choice.reveal-answer{border-color:var(--good);background:var(--good-soft)}
.choice:disabled{cursor:default}
.ox-wrap{display:flex;gap:12px}
.ox-wrap .choice{flex:1;text-align:center;font-size:26px;font-weight:700;padding:22px 0}

/* 빨간펜 채점 마크 — 시그니처 */
.grade-wrap{position:relative}
.grade-mark{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  pointer-events:none;z-index:5;
}
.grade-mark svg{width:130px;height:130px;overflow:visible}
.grade-mark path, .grade-mark circle{
  fill:none;stroke:var(--redpen);stroke-width:7;stroke-linecap:round;
  filter:drop-shadow(0 1px 1px rgba(214,69,61,.25));
}
.draw-o{stroke-dasharray:340;stroke-dashoffset:340;animation:draw .5s ease-out forwards}
.draw-x{stroke-dasharray:200;stroke-dashoffset:200;animation:draw .35s ease-out forwards}
@keyframes draw{to{stroke-dashoffset:0}}
@media (prefers-reduced-motion:reduce){
  .draw-o,.draw-x{animation:none;stroke-dashoffset:0}
  *{transition:none!important}
}

/* 해설 */
.explain{
  margin-top:16px;background:var(--card);border:1px dashed var(--redpen);
  border-radius:12px;padding:14px 16px;font-size:17px;line-height:1.75;
}
.explain .verdict{font-weight:700;margin-bottom:6px}
.explain .verdict.ok{color:var(--redpen)}
.explain .verdict.no{color:var(--redpen)}
.report-btn{
  margin-top:10px;background:none;border:none;font-family:inherit;
  font-size:12px;color:var(--ink-faint);text-decoration:underline;cursor:pointer;
}
.report-btn.done{color:var(--bluepen);text-decoration:none}

/* 결과 */
.result-hero{text-align:center;padding:38px 0 26px}
.result-hero .big{font-family:'IBM Plex Mono',monospace;font-size:52px;font-weight:600;color:var(--redpen)}
.result-hero .sub{color:var(--ink-soft);font-size:14px;margin-top:6px}
.result-list{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.result-row{display:flex;justify-content:space-between;font-size:14px;padding:11px 14px;background:var(--card);border:1px solid var(--line);border-radius:10px}
.result-row b{font-family:'IBM Plex Mono',monospace}

/* ---------- 복습함 / 통계 ---------- */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.stat-cell{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px}
.stat-cell b{font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:600;display:block}
.stat-cell span{font-size:12px;color:var(--ink-soft)}
.wrong-item{
  background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:12px 14px;margin-bottom:8px;font-size:14px;
}
.wrong-item .w-due{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--redpen);margin-top:4px}
.section-label{font-size:13px;font-weight:700;color:var(--ink-soft);margin:20px 0 10px;letter-spacing:.02em}
.dev-note{font-size:12px;color:var(--ink-faint);line-height:1.6;margin-top:8px}

/* ---------- 하단 탭 ---------- */
#tabbar{
  position:fixed;bottom:0;left:0;right:0;z-index:40;
  max-width:430px;margin:0 auto;
  display:flex;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);
  border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom);
}
#tabbar button{
  flex:1;background:none;border:none;cursor:pointer;font-family:inherit;
  padding:10px 0 8px;display:flex;flex-direction:column;align-items:center;gap:3px;
  font-size:11px;font-weight:600;color:var(--ink-faint);
}
#tabbar button.active{color:var(--ink)}
#tabbar button.active svg{stroke:var(--redpen)}
#tabbar svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.toast{
  position:fixed;left:50%;bottom:90px;transform:translateX(-50%);
  background:var(--ink);color:#fff;font-size:13px;font-weight:500;
  padding:10px 18px;border-radius:99px;z-index:99;opacity:0;transition:opacity .25s;
  pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1}
:focus-visible{outline:2px solid var(--bluepen);outline-offset:2px}

/* ---------- 반응형 (데스크탑) ---------- */
@media (min-width:820px){
  #app{ max-width:760px; }
  #tabbar{ max-width:760px; }
  #session{ max-width:760px; }
  #screen{ padding:28px 26px 110px; }
  h1.screen-title{ font-size:28px; }
  /* 탐색 주제 목록을 2열로 */
  .topic-grid{ display:grid !important; grid-template-columns:1fr 1fr; gap:10px !important; align-items:start; }
  /* 세션 본문은 가독성 위해 중앙 정렬·폭 제한 */
  .sess-body{ max-width:620px; margin:0 auto; width:100%; }
  .sess-top, .sess-foot{ max-width:620px; margin-left:auto; margin-right:auto; width:100%; }
  .today-card, .concept-card, .figure{ }
}
@media (min-width:1100px){
  #app{ max-width:860px; }
  #tabbar{ max-width:860px; }
  #session{ max-width:860px; }
}
</style>
</head>
<body>
<div id="app">
  <main id="screen" aria-live="polite"></main>
  <nav id="tabbar" aria-label="주요 메뉴">
    <button data-tab="home" class="active" aria-label="홈">
      <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h5v-6h4v6h5V10"/></svg>홈
    </button>
    <button data-tab="explore" aria-label="탐색">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M15 9l-2 5-4 1 2-5z"/></svg>탐색
    </button>
    <button data-tab="drill" aria-label="문제풀기">
      <svg viewBox="0 0 24 24"><path d="M13 2L4 14h6l-1 8 9-12h-6z"/></svg>문제풀기
    </button>
    <button data-tab="stories" aria-label="이야기">
      <svg viewBox="0 0 24 24"><path d="M4 5a2 2 0 012-2h8l6 6v10a2 2 0 01-2 2H6a2 2 0 01-2-2z"/><path d="M14 3v6h6"/></svg>이야기
    </button>
    <button data-tab="stats" aria-label="통계와 설정">
      <svg viewBox="0 0 24 24"><path d="M4 20V10"/><path d="M10 20V4"/><path d="M16 20v-7"/><path d="M22 20H2"/></svg>통계
    </button>
  </nav>
  <section id="session" role="dialog" aria-label="학습 세션"></section>
  <div class="confirm-overlay" id="confirm" role="dialog" aria-label="확인"></div>
  <div class="toast" id="toast"></div>
</div>
<script>
/* ============================================================
   콘텐츠 데이터
   실제 운영 시 이 블록은 별도 JSON 파일로 분리하고
   파이썬 검증/빌드 스크립트를 거쳐 삽입한다.
   ============================================================ */
/* 4개 과목 영역 (2015 개정 교육과정) */
/* ============================================================
   콘텐츠는 data/ 폴더의 JSON에서 fetch로 불러온다.
   - data/index.json          : 도메인 메타 + 커리큘럼(주제 목록·태그)
   - data/topics/<id>.json     : 주제별 카드+문제 (학습 시작 시 로드)
   ============================================================ */
let DOMAINS = [];
let CURRICULUM = {};
const CARDS = {};        // 주제별 카드 (fetch로 채워짐)
const QUESTIONS = {};    // 주제별 문제 (fetch로 채워짐)

/* 수능형 전용 문제은행(양치기 전용) — 탐색 탭 커리큘럼과는 별도 저장소.
   기출 원문이 아니라 출제 경향만 참고해 100% 새로 쓴 문항만 담는다. */
const SUENUNG_BANKS = {physics:'physics-suneung', chem:'chem-suneung', bio:'bio-suneung', earth:'earth-suneung'};
const SUENUNG_TITLES = {'physics-suneung':'물리학Ⅰ 수능형', 'earth-suneung':'지구과학 수능형', 'bio-suneung':'생명과학 수능형', 'chem-suneung':'화학 수능형'};
const loadedSuenung = {};
async function ensureSuenungLoaded(subject){
  const bankId = SUENUNG_BANKS[subject];
  if(!bankId || loadedSuenung[bankId]) return bankId || null;
  try{
    const res = await fetch(`${DATA_BASE}/suneung/${subject}.json`);
    if(!res.ok) return null;
    const data = await res.json();
    CARDS[bankId] = [];
    QUESTIONS[bankId] = data.questions || [];
    loadedSuenung[bankId] = true;
    return bankId;
  }catch(e){ return null; }
}
const LEVEL_LABEL = {1:'쉬움', 2:'보통', 3:'도전'};

/* 커리큘럼 헬퍼 (CURRICULUM이 로드된 뒤 동작) */
function allTopics(did){
  if(did && did!=='all') return (CURRICULUM[did]||[]).map(t=>({...t, domain:did}));
  const out=[]; for(const d in CURRICULUM) (CURRICULUM[d]||[]).forEach(t=>out.push({...t, domain:d})); return out;
}
function allUnits(did){ return allTopics(did); }
function allTags(){
  const cnt={}; allTopics().forEach(t=>t.tags.forEach(tag=>cnt[tag]=(cnt[tag]||0)+1));
  return Object.keys(cnt).sort((a,b)=>cnt[b]-cnt[a]);
}

/* ── 콘텐츠 로더 ─────────────────────────────────────────── */
const DATA_BASE = 'data';
const loadedTopics = {};   // id -> true

async function loadIndex(){
  const res = await fetch(`${DATA_BASE}/index.json`);
  if(!res.ok) throw new Error('index '+res.status);
  const data = await res.json();
  DOMAINS = data.domains || [];
  CURRICULUM = data.curriculum || {};
}
async function loadTopic(id){
  if(loadedTopics[id]) return;
  const res = await fetch(`${DATA_BASE}/topics/${id}.json`);
  if(!res.ok) throw new Error('topic '+id+' '+res.status);
  const data = await res.json();
  CARDS[id] = data.cards || [];
  QUESTIONS[id] = data.questions || [];
  loadedTopics[id] = true;
}
async function ensureLoaded(ids){
  const uniq = [...new Set((ids||[]).filter(Boolean))];
  await Promise.all(uniq.map(id => loadTopic(id).catch(e => console.warn('로드 실패:', e.message))));
}

/* 이야기 인덱스(메타·해금조건) — 시작 시 로드 */
let STORIES = [];
async function loadStoriesIndex(){
  try{
    const res = await fetch(`${DATA_BASE}/stories/index.json`);
    if(res.ok){ STORIES = (await res.json()).stories || []; }
  }catch(e){ STORIES = []; }
}
const storyCache = {};
async function loadStory(id){
  if(storyCache[id]) return storyCache[id];
  const res = await fetch(`${DATA_BASE}/stories/${id}.json`);
  if(!res.ok) throw new Error('story '+id);
  return storyCache[id] = await res.json();
}
async function loadDiagnostic(subject){
  const res = await fetch(`${DATA_BASE}/diagnostics/${subject}.json`);
  if(!res.ok) throw new Error('diag '+subject);
  return res.json();
}

/* ── 학습 단계(stage) ─────────────────────────────────────── */
const STAGE_ORDER = ['ms','hs','ug'];
const STAGE_LABEL = {ms:'입문', hs:'심화', ug:'전공'};
function topicDomain(topicId){
  for(const d in CURRICULUM){ if((CURRICULUM[d]||[]).some(t=>t.id===topicId)) return d; }
  return null;
}
function currentStage(topicId){
  const dom = topicDomain(topicId);
  return (dom && S.subjectStage[dom]) || 'ms';
}

/* ============================================================
   저장 모듈
   localStorage에 진도를 영구 저장한다. (서버 없이 기기 내 유지)
   기기 간 이동은 통계 탭의 내보내기/가져오기를 사용.
   ============================================================ */
const Storage = (() => {
  const KEY = 'haru-science-v1';
  return {
    load(){ try{ const v = localStorage.getItem(KEY); return v ? JSON.parse(v) : null; }catch(e){ return null; } },
    save(s){ try{ localStorage.setItem(KEY, JSON.stringify(s)); }catch(e){} },
  };
})();

/* ============================================================
   사용자 상태
   day: 시뮬레이션 날짜 카운터 (설정의 개발자 도구로 하루씩 넘겨
        간격 반복이 실제로 도는지 확인할 수 있다)
   ============================================================ */
const SRS_INTERVALS = [1, 3, 7, 21];   // 틀리면 0단계(1일)로, 맞히면 다음 단계로
const SESSION_Q = 7;                    // 세션당 문제 수
const SESSION_C = 3;                    // 세션당 카드 수
const DEFAULT_TOPIC = 'p1-motion';      // 홈 '오늘의 세션'이 기본으로 여는 주제
const DEV_MODE = new URLSearchParams(location.search).get('dev') === '0919';

let S = Storage.load() || {
  day: 0,
  streak: 0,
  lastStudyDay: -1,
  seenCards: {},        // cardId -> true
  srs: {},              // qId -> {step, due, graduated}
  attempts: {},         // qId -> {tries, correct}
  stats: {answered: 0, correct: 0},
  reports: [],          // {qId, day}
  storyReports: [],      // {storyId, day}
  qMeta: {},            // qId -> {q, topic}  미로딩 주제 표시·복습 로드용 스냅샷
  subjectStage: {physics:'ms', chem:'ms', bio:'ms', earth:'ms'},  // 과목별 현재 학습 단계(진단 전 기본값은 입문)
  diagDone: {},         // subject -> true (진단 완료 여부)
  diagBannerDismissed: false,  // 홈 진단 추천 배너를 건너뛰기로 닫았는지
  graduatedTopics: {},  // topicId -> true (해당 주제 문제 전체를 한 번씩 다 푼 완주 여부)
  readStories: {},      // storyId -> true
  studyDates: {},       // 'YYYY-MM-DD' -> true  (실제 달력 출석 기록)
};
/* 예전 저장본 마이그레이션(신규 필드 보강) */
S.subjectStage = Object.assign({physics:'ms',chem:'ms',bio:'ms',earth:'ms'}, S.subjectStage||{});
S.diagDone = S.diagDone || {};
S.graduatedTopics = S.graduatedTopics || {};
S.storyReports = S.storyReports || [];
S.readStories = S.readStories || {};
S.qMeta = S.qMeta || {};
S.studyDates = S.studyDates || {};
function save(){ Storage.save(S); }

/* ── 출석(실제 달력 날짜 기반) ─────────────────────────────── */
function ymd(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function todayStr(){ return ymd(new Date()); }
function markAttendance(){ S.studyDates[todayStr()] = true; save(); }
function attendanceStreak(){   // 오늘(또는 어제)부터 거슬러 연속 학습일
  let n=0; const d=new Date();
  if(!S.studyDates[ymd(d)]){ d.setDate(d.getDate()-1); if(!S.studyDates[ymd(d)]) return 0; }
  while(S.studyDates[ymd(d)]){ n++; d.setDate(d.getDate()-1); }
  return n;
}
function bestStreak(){
  const days = Object.keys(S.studyDates).filter(k=>S.studyDates[k]).sort();
  if(!days.length) return 0;
  let best=1, cur=1;
  for(let i=1;i<days.length;i++){
    const prev=new Date(days[i-1]+'T00:00'), now=new Date(days[i]+'T00:00');
    const diff=Math.round((now-prev)/86400000);
    cur = (diff===1) ? cur+1 : 1;
    if(cur>best) best=cur;
  }
  return best;
}
function totalStudyDays(){ return Object.keys(S.studyDates).filter(k=>S.studyDates[k]).length; }
</script>
<script>
/* ============================================================
   유틸 및 LaTeX 렌더링 도구
   ============================================================ */
const $ = sel => document.querySelector(sel);
/* 부정어 강조(<b>,<u>)만 화이트리스트로 허용하고 나머지 태그는 이스케이프 */
const esc = s => s.replace(/&/g,'&amp;').replace(/<(?!\/?(b|u)>)/g,'&lt;');
const shuffle = a => { a=[...a]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; };
const LV = ['','기초','원리','오개념'];

function toast(msg){
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove('show'), 1800);
}

/* 가벼운 확인 팝업(넛지) — 진단 등 되돌리기 애매한 선택 전에 한 번 더 물어봄 */
function showConfirm(html){
  $('#confirm').innerHTML = `<div class="confirm-card">${html}</div>`;
  $('#confirm').classList.add('show');
}
function hideConfirm(){ $('#confirm').classList.remove('show'); }

function confirmSkipDiagnostic(){
  showConfirm(`
    <h3>진단 없이 시작할까요?</h3>
    <p>진단을 하지 않으면 <b>${STAGE_LABEL.ms}</b> 수준에서 시작합니다. 언제든 과목별 <b>진단</b> 버튼으로 다시 맞춰볼 수 있어요.</p>
    <div class="confirm-actions">
      <button class="btn btn-ghost" style="flex:1" onclick="hideConfirm()">진단하러 가기</button>
      <button class="btn btn-primary" style="flex:1" onclick="skipDiagnostic()">건너뛰기</button>

}
function skipDiagnostic(){
  S.diagBannerDismissed = true; save();
  hideConfirm();
  toast(`${STAGE_LABEL.ms} 수준으로 시작해요`);

}

/* 문제/이야기 신고 — 사유를 적어 서버(Cloudflare Pages Function)로 전송, 실패해도 로컬 기록은 남는다 */
function reportLabel(type, id){
  if(type==='question') return qText(id);
  return (STORIES.find(s=>s.id===id)||{}).title || id;
}
function openReportModal(type, id){
  const label = reportLabel(type, id);
  showConfirm(`
    <h3>${type==='question'?'이 문제':'이 이야기'} 신고하기</h3>
    <p style="margin-bottom:8px">${esc(label)}</p>
    <textarea id="reportReason" placeholder="무엇이 잘못됐는지 알려주시면 확인에 도움이 돼요 (선택)" style="width:100%;min-height:70px;border:1px solid var(--line);border-radius:8px;padding:8px;font-family:inherit;font-size:13px;color:var(--ink);resize:vertical;margin-bottom:14px;background:var(--paper)"></textarea>
    <div class="confirm-actions">
      <button class="btn btn-ghost" style="flex:1" onclick="hideConfirm()">취소</button>
      <button class="btn btn-primary" style="flex:1" onclick="submitReport('${type}','${id}')">신고하기</button>
    </div>`);
}
async function submitReport(type, id){
  const reasonEl = document.getElementById('reportReason');
  const reason = reasonEl ? reasonEl.value.trim() : '';
  hideConfirm();

  if(type==='question'){
    if(!S.reports.some(r=>r.qId===id)) S.reports.push({qId:id, day:S.day});
    document.querySelectorAll(`.report-btn[data-report-id="${id}"]`).forEach(b=>{ b.textContent='신고 접수됨'; b.classList.add('done'); b.onclick=null; });
  } else {
    if(!S.storyReports.some(r=>r.storyId===id)) S.storyReports.push({storyId:id, day:S.day});
    document.querySelectorAll(`.report-btn[data-report-id="${id}"]`).forEach(b=>{ b.textContent='신고 접수됨'; b.classList.add('done'); b.onclick=null; });
  }
  save();
  toast('신고했어요. 확인 후 반영할게요');

  try{
    await fetch('/api/report', {
      method:'POST',
      headers:{'content-type':'application/json'},
      body: JSON.stringify({ type, id, title: reportLabel(type, id), reason, day: S.day })
    });
  }catch(e){ /* 네트워크 실패해도 로컬 기록은 이미 남았으니 조용히 무시 */ }
}

/* 동적 DOM 교체 시 KaTeX 렌더링을 격발해주는 안전 래퍼 함수 */
function triggerMathRender(target) {
  const el = target || document.getElementById('app');
  if (typeof renderMathInElement !== 'undefined' && el) {
    try {
      renderMathInElement(el, {
        delimiters: [
          {left: '$$', right: '$$', display: true},
          {left: '$', right: '$', display: false}
        ],
        throwOnError: false
      });
    } catch(e) {
      console.warn('KaTeX 수식 렌더링에 오류가 발생했습니다:', e);
    }
  }
}

function findQ(qId){
  for(const u in QUESTIONS){ const f = QUESTIONS[u].find(q=>q.id===qId); if(f) return {...f, unit:u}; }
  return null;
}
/* 목록 표시용 문제 텍스트: 스냅샷 우선(미로딩 주제도 표시 가능) */
function qText(qId){ return (S.qMeta[qId]||{}).q || (findQ(qId)||{}).q || qId; }
function unitName(uid){
  if(SUENUNG_TITLES[uid]) return SUENUNG_TITLES[uid];
  for(const d in CURRICULUM){ const t = CURRICULUM[d].find(x=>x.id===uid); if(t) return t.title; }
  return uid;
}
function dueQuestions(){
  return Object.entries(S.srs)
    .filter(([id,v]) => !v.graduated && v.due <= S.day)
    .map(([id]) => id);
}

/* ============================================================
   세션 엔진
   규칙: 복습 예정 문제 우선 → 부족분은 해당 단원의 새 문제
   ============================================================ */
let sess = null;

function stageFillOrder(cur){
  // 현재 단계 우선 → 쉬운 단계(아래) 먼저 → 그다음 어려운 단계(위)
  const idx = STAGE_ORDER.indexOf(cur);
  const order = [cur];
  for(let i=idx-1;i>=0;i--) order.push(STAGE_ORDER[i]);   // 아래쪽(쉬움)
  for(let i=idx+1;i<STAGE_ORDER.length;i++) order.push(STAGE_ORDER[i]); // 위쪽(어려움)
  return order;
}
function buildSession(unitId){
  const stage = currentStage(unitId);
  const allQ = QUESTIONS[unitId] || [];
  const allC = CARDS[unitId] || [];
  const order = stageFillOrder(stage);
  const due = shuffle(dueQuestions()).slice(0, SESSION_Q);   // 복습은 단계 무관

  // 새 문제: 현재 단계부터 채우고, 모자라면 인접 단계로 보충
  let fresh = [];
  for(const st of order){
    if(due.length + fresh.length >= SESSION_Q) break;
    fresh = fresh.concat(allQ.filter(q => q.stage===st && !S.attempts[q.id] && !due.includes(q.id) && !fresh.includes(q)));
  }
  const qIds = [...due, ...fresh.slice(0, Math.max(0, SESSION_Q - due.length)).map(q=>q.id)];

  // 카드도 같은 우선순위로 채움
  let cards = [];
  for(const st of order){
    if(cards.length >= SESSION_C) break;
    cards = cards.concat(allC.filter(c => c.stage===st && !S.seenCards[c.id]));
  }
  cards = cards.slice(0, SESSION_C);

  return { unitId, stage, cards, qIds, idx: 0, phase: cards.length ? 'card' : 'quiz', qIdx: 0, correct: 0, answered: false };
}

async function startSession(unitId){
  /* 현재 주제 + 복습 큐에 있는 문제들의 주제를 모두 로드 */
  const dueTopics = dueQuestions().map(qId => (S.qMeta[qId]||{}).topic);
  try { await ensureLoaded([unitId, ...dueTopics]); }
  catch(e){ toast('콘텐츠를 불러오지 못했어요'); return; }
  const s = buildSession(unitId);
  if(!s.qIds.length && !s.cards.length){
    const stage = currentStage(unitId);
    toast(`${STAGE_LABEL[stage]} 단계의 새 문제·복습을 모두 마쳤어요`); return;
  }
  sess = s;
  $('#session').classList.add('open');
  renderSession();
}
function closeSession(){ sess = null; $('#session').classList.remove('open'); render(); }

/* 문제풀기(양치기) — 여러 주제의 문제를 모아 카드 없이 문제만 연속으로 푸는 모드 */
async function startDrill(){
  const subjects = drillSubject==='all' ? Object.keys(SUENUNG_BANKS) : [drillSubject];
  if(!subjects.some(s=>SUENUNG_BANKS[s])){ toast('아직 준비된 수능형 문제은행이 없어요'); return; }
  try { await Promise.all(subjects.map(ensureSuenungLoaded)); }
  catch(e){ toast('콘텐츠를 불러오지 못했어요'); return; }

  const bankIds = subjects.map(s=>SUENUNG_BANKS[s]).filter(Boolean);
  let pool = [];
  bankIds.forEach(uid=>{
    (QUESTIONS[uid]||[]).forEach(q=>{
      if(drillStage==='all' || q.stage===drillStage) pool.push(q.id);
    });
  });
  if(!pool.length){ toast('조건에 맞는 문제가 없어요. 다른 조건으로 시도해보세요'); return; }

  const qIds = shuffle(pool).slice(0, drillCount);
  sess = { unitId:null, isDrill:true, stage:drillStage, cards:[], qIds, idx:0, phase:'quiz', qIdx:0, correct:0, answered:false };
  $('#session').classList.add('open');
  renderSession();
}

/* ============================================================
   스마트 라우팅 어댑티브 진단 평가 엔진 (Adaptive Diagnostic Engine)
   ============================================================ */
let diag = null;

async function startDiagnostic(subject){
  let data;
  try { data = await loadDiagnostic(subject); }
  catch(e){ toast('진단을 불러오지 못했어요'); return; }

  // 1. 가져온 문제들을 난이도별(ms, hs, ug) 풀로 쪼개어 무작위화 준비
  const pool = { ms: [], hs: [], ug: [] };
  (data.items || []).forEach(it => {
    if (pool[it.stage]) pool[it.stage].push(it);
  });

  // 혹시라도 첫 기준점인 '심화(hs)' 문항이 비어있는지 진단 품질 검사
  if (!pool['hs'] || pool['hs'].length === 0) {
    toast('진단에 필요한 문항 데이터가 불충분합니다.');
    return;
  }

  // 2. 어댑티브 진단 세션 구조체 초기화
  diag = {
    subject,
    title: data.title,
    pool,                 // 전체 난이도별 문항 저장소
    currentStage: 'hs',   // 진입 첫 단계는 무조건 '심화(hs)'으로 허리 라인 시작
    stageStep: 1,         // 진단 단계 (1단계: 심화 ➔ 2단계: 결과에 따른 입문 또는 전공 분기)
    stageIdx: 0,          // 현재 가동 단계에서 풀고 있는 문제 인덱스 (0, 1, 2)
    stageItems: [],       // 현재 가동 단계에서 제시되는 3문항 묶음
    answered: false,
    correctCount: 0,      // 현재 가동 단계 내에서 맞춘 개수 (3개 만점 기준 분기 판단용)
    correct: { ms: 0, hs: 0, ug: 0 },
    total: { ms: 0, hs: 0, ug: 0 }
  };

  // 심화(hs) 풀에서 무작위로 3문항을 추출하여 1단계 문제 세트 생성
  diag.stageItems = shuffle(pool['hs']).slice(0, 3);

  $('#session').classList.add('open');
  renderDiag();
}

function closeDiag(){ diag = null; $('#session').classList.remove('open'); render(); }

function renderDiag(){
  const el = $('#session');
  if(!diag) return;

  // 전체 6문항 중 현재 풀고 있는 글로벌 진행 번호 계산 (0 ~ 5)
  const globalIdx = (diag.stageStep - 1) * 3 + diag.stageIdx;
  
  if(globalIdx >= 6 || diag.stageIdx >= diag.stageItems.length){
    return renderDiagResult(el);
  }

  const it = diag.stageItems[diag.stageIdx];
  let choices;
  if(it.type==='ox'){
    choices = `<div class="ox-wrap">
      <button class="choice" data-i="1" onclick="answerDiag(1)">O</button>
      <button class="choice" data-i="0" onclick="answerDiag(0)">X</button></div>`;
  } else {
    choices = it.choices.map((c,i)=>`<button class="choice" data-i="${i}" onclick="answerDiag(${i})">${esc(c)}</button>`).join('');
  }

  el.innerHTML = `
    <div class="sess-top">
      <button class="sess-close" onclick="closeDiag()" aria-label="닫기">×</button>
      <div class="sess-track"><i style="width:${Math.round(100 * globalIdx / 6)}%"></i></div>
      <span class="mono" style="font-size:11px;color:var(--ink-faint)">어댑티브 진단 (${STAGE_LABEL[diag.currentStage]})</span>
    </div>
    <div class="sess-body">
      <span class="eyebrow">${esc(diag.title)} · 문항 ${globalIdx + 1}/6</span>
      <p class="q-text" style="margin-top:12px">${esc(it.q)}</p>
      <div class="grade-wrap" id="gradeWrap">${choices}<div class="grade-mark" id="gradeMark"></div></div>
      <div id="explainBox"></div>
    </div>
    <div class="sess-foot" id="sessFoot"></div>`;

  // 수식 렌더링 격발
  triggerMathRender(el);
}

function answerDiag(picked){
  if(diag.answered) return; 
  diag.answered = true;

  const it = diag.stageItems[diag.stageIdx];
  const correctIdx = it.type==='ox' ? (it.answer?1:0) : it.answer;
  const ok = picked === correctIdx;

  // 통계 집계
  diag.total[it.stage]++; 
  if(ok) {
    diag.correct[it.stage]++;
    diag.correctCount++;
  }

  // 선택지 잠금 및 시각화 채점 피드백
  document.querySelectorAll('.choice').forEach(b=>{ 
    b.disabled = true; 
    const i = +b.dataset.i;
    if(i === picked) b.classList.add(ok ? 'picked-right' : 'picked-wrong');
    if(!ok && i === correctIdx) b.classList.add('reveal-answer'); 
  });

  $('#gradeMark').innerHTML = ok
    ? `<svg viewBox="0 0 100 100"><circle class="draw-o" cx="50" cy="50" r="42"/></svg>`
    : `<svg viewBox="0 0 100 100"><path class="draw-x" d="M78 18 L22 86"/></svg>`;

  $('#explainBox').innerHTML = `<div class="explain"><div class="verdict ${ok ? 'ok' : 'no'}">${ok ? '정답' : '오답'}</div>${esc(it.ex)}</div>`;
  
  // 새로 뿌려진 해설 영역 내 수식 렌더링 격발
  triggerMathRender($('#explainBox'));

  const globalIdx = (diag.stageStep - 1) * 3 + diag.stageIdx;
  const isLast = (globalIdx + 1) >= 6;
  $('#sessFoot').innerHTML = `<button class="btn btn-primary" onclick="nextDiag()">${isLast ? '결과 보기' : '다음'}</button>`;
}

function nextDiag(){
  diag.answered = false;
  diag.stageIdx++;

  // 현재 난이도의 3개 문항을 다 풀었을 때 분기 계산 (Routing Trigger)
  if(diag.stageIdx >= diag.stageItems.length) {
    if(diag.stageStep === 1) {
      // 1단계(심화) 종료 지점
      diag.stageStep = 2;
      diag.stageIdx = 0;

      if(diag.correctCount >= 2) {
        // [우수] 3문제 중 2문제 이상 정답 ➔ '전공(ug)' 코스로 상향 라우팅!
        diag.currentStage = 'ug';
      } else {
        // [미흡] 3문제 중 1문제 이하 정답 ➔ '입문(ms)' 코스로 하향 라우팅!
        diag.currentStage = 'ms';
      }
      
      diag.correctCount = 0; // 카운터 초기화
      const nextPool = diag.pool[diag.currentStage] || [];
      diag.stageItems = shuffle(nextPool).slice(0, 3);
      
      // 풀에 문제가 더 없을 경우를 대비한 방어 코드
      if (diag.stageItems.length === 0) {
        return renderDiagResult($('#session'));
      }
    } else {
      // 2단계까지 모두 완료한 경우
      return renderDiagResult($('#session'));
    }
  }

  // 예외 처리를 위한 글로벌 상한 경계 검사
  const globalIdx = (diag.stageStep - 1) * 3 + diag.stageIdx;
  if(globalIdx >= 6){
    return renderDiagResult($('#session'));
  }

  renderDiag();
}

function recommendStage(correct, total){
  // 어댑티브 라우팅 판별 수식
  // 2단계에서 '전공(ug)' 경로를 거쳤을 경우
  if ((total['ug'] || 0) > 0) {
    // 전공 경로에서 2개 이상 맞추면 최종 [전공(ug)], 떨어지면 탄탄히 다지기 위해 [심화(hs)]부터 시작
    return (correct['ug'] >= 2) ? 'ug' : 'hs';
  }
  // 2단계에서 '입문(ms)' 경로를 거쳤을 경우
  if ((total['ms'] || 0) > 0) {
    // 입문 경로에서 2개 이상 맞추면 무난하게 [심화(hs)] 추천, 그 미만이면 완벽한 기초 보충 위해 [입문(ms)] 추천
    return (correct['ms'] >= 2) ? 'hs' : 'ms';
  }
  return 'hs';
}

function renderDiagResult(el){
  const rec = recommendStage(diag.correct, diag.total);
  const subj = diag.subject;
  S.subjectStage[subj] = rec;
  S.diagDone[subj] = true;
  save();

  const dName = (DOMAINS.find(d=>d.id===subj)||{}).name || subj;
  
  // 라우팅 여정의 궤적을 붉은펜 채점 스타일의 결과 리스트로 아름답게 조립
  let rows = '';
  
  // 1단계 기록 추가 (심화)
  if ((diag.total['hs'] || 0) > 0) {
    const passed = diag.correct['hs'] >= 2;
    rows += `
      <div class="result-row" style="border-left: 3px solid var(--bluepen); flex-direction:column; align-items:flex-start; gap:4px">
        <div style="display:flex; justify-content:space-between; width:100%; font-size:14px; font-weight:700">
          <span>1단계: ${STAGE_LABEL['hs']} 과정 (공통 기준점)</span>
          <b class="mono" style="color:var(--bluepen)">${diag.correct['hs']}/${diag.total['hs']}</b>
        </div>
        <div style="font-size:12px; color:var(--ink-soft)">
          ➔ ${passed ? `2문항 이상 정답으로 <b>상위 과정(${STAGE_LABEL.ug})</b>으로 맞춤 라우팅` : `1문항 이하 정답으로 <b>기초 과정(${STAGE_LABEL.ms})</b>으로 맞춤 라우팅`}
        </div>
      </div>`;
  }

  // 2단계 기록 추가 (입문 혹은 전공)
  const step2Stage = diag.total['ug'] > 0 ? 'ug' : (diag.total['ms'] > 0 ? 'ms' : null);
  if (step2Stage) {
    const isUg = step2Stage === 'ug';
    const passed = diag.correct[step2Stage] >= 2;
    let desc = '';
    if (isUg) {
      desc = passed ? `${STAGE_LABEL.ug} 수준의 고급 추론 능력이 입증되었습니다.` : `${STAGE_LABEL.hs} 원리는 잘 알지만 ${STAGE_LABEL.ug} 이론은 보완이 권장됩니다.`;
    } else {
      desc = passed ? `${STAGE_LABEL.ms} 기초 개념이 확실하여 ${STAGE_LABEL.hs} 과정 진입에 무리가 없습니다.` : `과학적 개념 오해를 해소하기 위해 ${STAGE_LABEL.ms} 기초 개념부터 빌드업이 필요합니다.`;
    }
    rows += `
      <div class="result-row" style="border-left: 3px solid ${isUg ? 'var(--d-space)' : 'var(--d-life)'}; flex-direction:column; align-items:flex-start; gap:4px; margin-top:8px">
        <div style="display:flex; justify-content:space-between; width:100%; font-size:14px; font-weight:700">
          <span>2단계: ${STAGE_LABEL[step2Stage]} 과정 (${isUg ? '상위 판정' : '기초 보정'})</span>
          <b class="mono" style="color:${isUg ? 'var(--d-space)' : 'var(--d-life)'}">${diag.correct[step2Stage]}/${diag.total[step2Stage]}</b>
        </div>
        <div style="font-size:12px; color:var(--ink-soft)">➔ ${desc}</div>
      </div>`;
  }

  el.innerHTML = `
    <div class="sess-top">
      <button class="sess-close" onclick="closeDiag()" aria-label="닫기">×</button>
      <div class="sess-track"><i style="width:100%"></i></div>
    </div>
    <div class="sess-body">
      <div class="result-hero" style="padding-bottom:18px">
        <div class="eyebrow" style="color:var(--redpen); margin-bottom:6px">ADAPTIVE DIAGNOSIS COMPLETE</div>
        <div class="big" style="font-size:38px; color:var(--redpen); font-weight:700">${STAGE_LABEL[rec]} 단계</div>
        <div class="sub" style="margin-top:10px; line-height:1.6; font-size:15px">
          ${dName} 진단 결과, 회원님의 최적 학습 출발지는 <b>${STAGE_LABEL[rec]}</b> 과정으로 설정되었습니다.
        </div>
      </div>
      <div class="section-label" style="margin-bottom:8px">어댑티브 라우팅 매칭 리포트</div>
      <div class="result-list">${rows}</div>
      <p class="dev-note" style="margin-top:16px; line-height:1.6">

      </p>
    </div>
    <div class="sess-foot">
      <button class="btn btn-primary" onclick="closeDiag()">맞춤 과정으로 바로 시작</button>

  triggerMathRender(el);

/* ============================================================
   이야기 리더 + 해금 판정
   ============================================================ */
function storyUnlocked(st){
  const u = st.unlock || {}; const scope = u.scope || [];
  if(u.type==='topicsStarted'){
    return scope.filter(tid=>topicStarted(tid)).length >= (u.count||1);
  }
  if(u.type==='correctInTopic'){
    let n=0; for(const qId in S.attempts){ const m=S.qMeta[qId];
      if(m && scope.includes(m.topic) && S.attempts[qId].correct>0) n++; }
    return n >= (u.count||1);
  }
  return false;
}

function closeStory(){ $('#session').classList.remove('open'); render(); }

function sessProgress(){
  const total = sess.cards.length + sess.qIds.length;
  const done = (sess.phase==='card' ? sess.idx : sess.cards.length + sess.qIdx);
  return Math.round(100 * done / Math.max(total,1));
}

/* 세션 상단에 표시할 라벨: 일반 세션은 주제명, 문제풀기(다중 주제)는 현재 문제의 출처 주제명 */
function sessLabel(){
  if(!sess.isDrill) return unitName(sess.unitId);
  const qId = sess.qIds[sess.qIdx];
  const q = qId && findQ(qId);
  return q ? `문제풀기 · ${unitName(q.unit)}` : '문제풀기';
}

function renderSession(){
  const el = $('#session');
  if(!sess) return;
  if(sess.phase === 'done'){ renderResult(el); return; }
  const head = `
    <div class="sess-top">
      <button class="sess-close" onclick="closeSession()" aria-label="세션 닫기">×</button>
      <div class="sess-track"><i style="width:${sessProgress()}%"></i></div>
      <span class="mono" style="font-size:11px;color:var(--ink-faint)">${sessLabel()}</span>
    </div>`;

  if(sess.phase === 'card'){
    const c = sess.cards[sess.idx];
    el.innerHTML = head + `
      <div class="sess-body">
        <span class="eyebrow concept-tag">CONCEPT ${sess.idx+1} / ${sess.cards.length}</span>
        <div class="card concept-card">
          <h2>${c.title}</h2>
          <p>${c.body}</p>
          ${c.fig ? `<figure class="figure">${c.fig}${c.figcap?`<figcaption>${c.figcap}</figcaption>`:''}</figure>` : ''}
          ${c.example ? `<div class="example">${c.example}</div>` : ''}
        </div>
      </div>
      <div class="sess-foot"><button class="btn btn-primary" onclick="nextCard()">이해했어요</button></div>`;
    triggerMathRender(el);
    return;
  }

  /* quiz */
  const qId = sess.qIds[sess.qIdx];
  const q = findQ(qId);
  const isReview = !!S.attempts[qId] && !sess.answered;
  let choicesHtml = '';
  if(q.type === 'ox'){
    choicesHtml = `<div class="ox-wrap">
      <button class="choice" data-i="1" onclick="answer(1)">O</button>
      <button class="choice" data-i="0" onclick="answer(0)">X</button></div>`;
  } else {
    choicesHtml = q.choices.map((c,i)=>`<button class="choice" data-i="${i}" onclick="answer(${i})">${esc(c)}</button>`).join('');
  }
  el.innerHTML = head + `
    <div class="sess-body">
      <div style="display:flex;gap:6px;align-items:center" class="q-level">
        <span class="eyebrow">Q${sess.qIdx+1} / ${sess.qIds.length}</span>
        <span class="chip badge-ready">${LV[q.level]}</span>
        ${isReview?'<span class="chip" style="background:var(--redpen-soft);color:var(--redpen)">복습</span>':''}
        ${q.type==='misc'?'<span class="chip badge-soon">오개념 판별</span>':''}
      </div>
      <p class="q-text">${esc(q.q)}</p>
      ${q.fig ? `<figure class="figure q-figure">${q.fig}${q.figcap?`<figcaption>${q.figcap}</figcaption>`:''}</figure>` : ''}
      <div class="grade-wrap" id="gradeWrap">${choicesHtml}<div class="grade-mark" id="gradeMark"></div></div>
      <div id="explainBox"></div>
    </div>
    <div class="sess-foot" id="sessFoot"></div>`;

  triggerMathRender(el);
}

function nextCard(){
  const c = sess.cards[sess.idx];
  S.seenCards[c.id] = true; save();
  sess.idx++;
  if(sess.idx >= sess.cards.length) sess.phase = sess.qIds.length ? 'quiz' : 'done';
  renderSession();
}

function answer(picked){
  if(sess.answered) return;
  sess.answered = true;
  const qId = sess.qIds[sess.qIdx];
  const q = findQ(qId);
  const correctIdx = q.type==='ox' ? (q.answer?1:0) : q.answer;
  const ok = picked === correctIdx;

  /* 기록 */
  const at = S.attempts[qId] || {tries:0, correct:0};
  at.tries++; if(ok) at.correct++;
  S.attempts[qId] = at;
  S.qMeta[qId] = {q: q.q, topic: q.unit};   // 미로딩 상태에서도 목록에 표시·복습 로드 가능
  S.stats.answered++; if(ok){ S.stats.correct++; sess.correct++; }

  /* 간격 반복 갱신 */
  const cur = S.srs[qId] || {step:-1, due:S.day, graduated:false};
  if(ok){
    const step = cur.step + 1;
    if(step >= SRS_INTERVALS.length) S.srs[qId] = {step, due:Infinity, graduated:true};
    else S.srs[qId] = {step, due:S.day + SRS_INTERVALS[step], graduated:false};
  } else {
    S.srs[qId] = {step:0, due:S.day + 1, graduated:false};
  }
  save();

  /* 선택지 잠금 + 표시 */
  document.querySelectorAll('.choice').forEach(b=>{
    b.disabled = true;
    const i = +b.dataset.i;
    if(i===picked) b.classList.add(ok?'picked-right':'picked-wrong');
    if(!ok && i===correctIdx) b.classList.add('reveal-answer');
  });

  /* 빨간펜 채점 마크 */
  $('#gradeMark').innerHTML = ok
    ? `<svg viewBox="0 0 100 100"><circle class="draw-o" cx="50" cy="50" r="42"/></svg>`
    : `<svg viewBox="0 0 100 100"><path class="draw-x" d="M78 18 L22 86"/></svg>`;

  /* 해설 */
  const reported = S.reports.some(r=>r.qId===qId);
  $('#explainBox').innerHTML = `
    <div class="explain">
      <div class="verdict ${ok?'ok':'no'}">${ok?'정답!':'오답'} ${ok?'':'— 내일 복습 큐에 담았어요'}</div>
      ${esc(q.ex)}
      <div><button class="report-btn ${reported?'done':''}" data-report-id="${qId}" onclick="${reported?'':`openReportModal('question','${qId}')`}">${reported?'신고 접수됨':'이 문제 신고하기'}</button></div>
    </div>`;

  triggerMathRender($('#explainBox'));

  $('#sessFoot').innerHTML = `<button class="btn btn-primary" onclick="nextQ()">${sess.qIdx+1>=sess.qIds.length?'결과 보기':'다음 문제'}</button>`;
}

function nextQ(){
  sess.qIdx++; sess.answered = false;
  if(sess.qIdx >= sess.qIds.length){
    sess.phase = 'done';
    markAttendance();                 // 실제 달력 날짜로 출석 기록
    S.streak = attendanceStreak();    // 표시용 스트릭도 실제 날짜 기준
    /* 이 세션으로 주제의 모든 문제를 처음 다 풀었다면 완주 표시(문제풀기는 여러 주제를 오갈 수 있어 전부 검사) */
    const touchedTopics = sess.isDrill
      ? [...new Set(sess.qIds.map(id => (S.qMeta[id]||{}).topic).filter(Boolean))]
      : [sess.unitId];
    sess.justGraduatedTopics = touchedTopics.filter(uid => unitProgress(uid) >= 100 && !S.graduatedTopics[uid]);
    sess.justGraduatedTopics.forEach(uid => { S.graduatedTopics[uid] = true; });
    save();
  }
  renderSession();
}

function renderResult(el){
  const total = sess.qIds.length;
  const pct = total ? Math.round(100*sess.correct/total) : 100;
  const gradBanner = (sess.justGraduatedTopics||[]).map(uid => `

let tab = 'home';

function topicStarted(topicId){
  for(const qId in S.qMeta){ if((S.qMeta[qId]||{}).topic===topicId) return true; }
  return false;
}
function unitProgress(uid){
  const qs = QUESTIONS[uid];
  if(!qs || !qs.length) return topicStarted(uid) ? 1 : 0;   // 미로딩: 시작 여부만
  const done = qs.filter(q=>S.attempts[q.id]).length;
  return Math.round(100*done/qs.length);
}
function domainProgress(did){
  const ready = allTopics(did).filter(t=>t.ready);
  if(!ready.length) return 0;
  const started = ready.filter(t=>topicStarted(t.id)).length;
  return Math.round(100*started/ready.length);
}

function attendanceCalendar(){
  const streak = attendanceStreak();
  const best = bestStreak();
  const total = totalStudyDays();
  const WD = ['일','월','화','수','목','금','토'];
  const today = new Date();
  let dots = '';
  for(let i=13;i>=0;i--){
    const d = new Date(today); d.setDate(today.getDate()-i);
    const key = ymd(d);
    const studied = !!S.studyDates[key];
    const isToday = i===0;
    dots += `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1">
      <span style="font-size:9px;color:var(--ink-faint)">${WD[d.getDay()]}</span>
      <span title="${key}" style="width:16px;height:16px;border-radius:5px;
        background:${studied?'var(--redpen)':'var(--paper)'};
        border:1.5px solid ${isToday?'var(--ink)':(studied?'var(--redpen)':'var(--line)')};
        display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff">${studied?'✓':''}</span>
      <span style="font-size:8px;color:var(--ink-faint)">${d.getDate()}</span>
    </div>`;
  }
  return `
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px">
        <div style="display:flex;align-items:baseline;gap:8px">
          <span class="streak-num" style="font-size:38px">${streak}</span>
          <span class="streak-label">일 연속 학습</span>

        <div style="text-align:right;font-size:12px;color:var(--ink-soft);line-height:1.5">
          <div>최고 <b class="mono" style="color:var(--ink)">${best}</b>일</div>
          <div>총 <b class="mono" style="color:var(--ink)">${total}</b>일 학습</div>

    </div>`;
}

    </div>

    ${S.reports.length
      ? S.reports.map(r=>`<div class="wrong-item">${esc(qText(r.qId))}<div class="w-due" style="color:var(--ink-faint)">Day ${r.day} 신고</div></div>`).join('')

    <div class="section-label">데이터 백업 · 기기 이동</div>

      <p style="font-size:13px;color:var(--ink-soft);margin-bottom:12px;line-height:1.6">진도는 이 브라우저에만 저장돼요. 카메라가 있는 두 기기끼리는 QR로 가장 빠르고, 데스크탑처럼 카메라가 애매한 경우엔 파일로 저장·불러오면 됩니다.</p>
      <div style="display:flex;gap:8px;margin-bottom:6px">
        <button class="btn btn-primary" onclick="showExportQR()" style="flex:1">QR로 보여주기</button>
        <button class="btn btn-red" onclick="openQrScanner()" style="flex:1">카메라로 스캔</button>
      </div>
      <div id="qrDisplay" style="text-align:center;margin:10px 0"></div>
      <div style="display:flex;gap:8px;margin-bottom:6px">
        <button class="btn btn-ghost" onclick="downloadBackup()" style="flex:1">파일로 저장</button>
        <button class="btn btn-ghost" onclick="document.getElementById('importFile').click()" style="flex:1">파일에서 가져오기</button>
      </div>
      <input type="file" id="importFile" accept=".json,application/json" style="display:none" onchange="importFromFile(this)">

          <textarea id="backupBox" placeholder="여기에 백업 코드가 나타납니다. 복사해서 안전한 곳에 보관하세요." style="width:100%;height:80px;border:1px solid var(--line);border-radius:10px;padding:10px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink);resize:vertical;margin-bottom:8px"></textarea>
          <button class="btn btn-ghost" onclick="copyBackup()" style="margin-bottom:14px">복사</button>
          <div style="border-top:1px dashed var(--line);padding-top:14px">
            <p style="font-size:13px;color:var(--ink-soft);margin-bottom:8px">백업 코드를 붙여넣고 가져오기</p>
            <textarea id="importBox" placeholder="다른 기기에서 만든 백업 코드를 여기에 붙여넣으세요." style="width:100%;height:70px;border:1px solid var(--line);border-radius:10px;padding:10px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink);resize:vertical;margin-bottom:8px"></textarea>
            <button class="btn btn-red" onclick="doImport()">가져오기 (현재 진도를 덮어씁니다)</button>

/* ── 백업 내보내기/가져오기 ──────────────────────────────
   서버 없이 기기 간 진도 이동. 버전 태그를 붙여 향후 호환성 확보. */
const BACKUP_VERSION = 1;
function exportString(){
  return JSON.stringify({ _app:'haru-sci', _v:BACKUP_VERSION, _at:new Date().toISOString(), state:S });
}
function doExport(){
  const box = document.getElementById('backupBox');
  if(box){ box.value = exportString(); box.focus(); box.select(); }
  toast('백업 코드를 만들었어요');
}
function copyBackup(){
  const box = document.getElementById('backupBox');
  if(!box || !box.value){ toast('먼저 내보내기를 눌러주세요'); return; }
  box.select();
  let ok = false;
  try { ok = document.execCommand('copy'); } catch(e){}
  if(navigator.clipboard){ navigator.clipboard.writeText(box.value).then(()=>toast('복사했어요')).catch(()=>{}); ok = true; }
  toast(ok ? '복사했어요' : '길게 눌러 직접 복사해주세요');
}
function downloadBackup(){
  const data = exportString();
  try {
    const blob = new Blob([data], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `haru-science-backup-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 1000);
    toast('파일로 저장했어요');
  } catch(e){
    const box = document.getElementById('backupBox');
    if(box){ box.value = data; }
    toast('저장이 막혀 있어요. 위 코드를 복사해 보관하세요');
  }
}
/* 백업 코드 문자열(텍스트 붙여넣기 또는 파일 내용)을 검증해 현재 상태에 반영. 성공 시 true. */
function applyImportedBackup(raw){
  if(!raw || !raw.trim()){ toast('가져올 백업 코드가 없어요'); return false; }
  let parsed;
  try { parsed = JSON.parse(raw.trim()); }
  catch(e){ toast('코드 형식이 올바르지 않아요'); return false; }
  const incoming = parsed && parsed.state ? parsed.state : parsed;   // 순수 state도 허용
  if(!incoming || typeof incoming !== 'object' || !('srs' in incoming) || !('stats' in incoming)){
    toast('하루사이 백업 코드가 아니에요'); return false;
  }
  /* 누락 필드 기본값 보강 */
  S = Object.assign(
    {day:0,streak:0,lastStudyDay:-1,seenCards:{},srs:{},attempts:{},stats:{answered:0,correct:0},reports:[],storyReports:[],qMeta:{},subjectStage:{physics:'ms',chem:'ms',bio:'ms',earth:'ms'},diagDone:{},diagBannerDismissed:false,graduatedTopics:{},readStories:{},studyDates:{}},
    incoming
  );
  S.subjectStage = Object.assign({physics:'ms',chem:'ms',bio:'ms',earth:'ms'}, S.subjectStage||{});
  if(!S.qMeta) S.qMeta = {}; if(!S.diagDone) S.diagDone={}; if(!S.graduatedTopics) S.graduatedTopics={}; if(!S.storyReports) S.storyReports=[]; if(!S.readStories) S.readStories={}; if(!S.studyDates) S.studyDates={};
  save(); render();
  toast('진도를 가져왔어요');
  return true;
}
function doImport(){
  const box = document.getElementById('importBox');
  if(!box || !box.value.trim()){ toast('가져올 백업 코드를 붙여넣어주세요'); return; }
  applyImportedBackup(box.value);
}
function importFromFile(input){
  const file = input.files && input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => applyImportedBackup(String(reader.result || ''));
  reader.onerror = () => toast('파일을 읽지 못했어요');
  reader.readAsText(file);
  input.value = '';
}

/* ── QR로 기기 간 이동 (서버 없이) ──────────────────────────
   QR 용량 한계 때문에 데이터가 크면 안내하고 파일 방식으로 유도한다. */
const QR_MAX_LEN = 1800;
function showExportQR(){
  const data = exportString();
  if(data.length > QR_MAX_LEN){
    toast('데이터가 너무 커서 QR로는 안 돼요. 파일로 저장해주세요');
    return;
  }
  const el = document.getElementById('qrDisplay');
  el.innerHTML = '';
  if(typeof QRCode === 'undefined'){ toast('QR 기능을 불러오지 못했어요'); return; }
  new QRCode(el, { text: data, width: 200, height: 200, correctLevel: QRCode.CorrectLevel.M });
  toast('다른 기기의 카메라로 이 QR을 스캔하세요');
}

let qrScanStream = null, qrScanRAF = null;
function openQrScanner(){
  if(typeof jsQR === 'undefined'){ toast('QR 기능을 불러오지 못했어요'); return; }
  showConfirm(`
    <h3>QR 코드 스캔</h3>
    <p style="margin-bottom:8px">다른 기기 화면에 띄운 QR 코드를 카메라로 비춰주세요.</p>
    <video id="qrVideo" playsinline muted style="width:100%;border-radius:10px;background:#000"></video>
    <canvas id="qrCanvas" style="display:none"></canvas>
    <div class="confirm-actions" style="margin-top:14px">
      <button class="btn btn-ghost" style="flex:1" onclick="closeQrScanner()">취소</button>
    </div>`);
  startQrScan();
}
async function startQrScan(){
  try{
    qrScanStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
  }catch(e){ toast('카메라를 사용할 수 없어요'); hideConfirm(); return; }
  const video = document.getElementById('qrVideo');
  if(!video){ closeQrScanner(); return; }
  video.srcObject = qrScanStream;
  await video.play();
  const canvas = document.getElementById('qrCanvas');
  const ctx = canvas.getContext('2d');
  const tick = () => {
    if(!qrScanStream) return;
    if(video.readyState === video.HAVE_ENOUGH_DATA){
      canvas.width = video.videoWidth; canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(img.data, img.width, img.height);
      if(code && code.data){
        const text = code.data;
        closeQrScanner();
        applyImportedBackup(text);
        return;
      }
    }
    qrScanRAF = requestAnimationFrame(tick);
  };
  qrScanRAF = requestAnimationFrame(tick);
}
function closeQrScanner(){
  if(qrScanRAF){ cancelAnimationFrame(qrScanRAF); qrScanRAF = null; }
  if(qrScanStream){ qrScanStream.getTracks().forEach(t => t.stop()); qrScanStream = null; }
  hideConfirm();
}

function devNextDay(){ S.day++; save(); render(); toast(`Day ${S.day} — 복습 ${dueQuestions().length}문제 대기 중`); }
function devFillAttendance(){
  const today=new Date();
  [0,1,2,3,5,6,9,10,12].forEach(back=>{ const d=new Date(today); d.setDate(today.getDate()-back); S.studyDates[ymd(d)]=true; });
  S.streak=attendanceStreak(); save(); render(); toast('출석 예시를 채웠어요');
}
function devReset(){
  S = {day:0,streak:0,lastStudyDay:-1,seenCards:{},srs:{},attempts:{},stats:{answered:0,correct:0},reports:[],storyReports:[],qMeta:{},subjectStage:{physics:'ms',chem:'ms',bio:'ms',earth:'ms'},diagDone:{},diagBannerDismissed:false,graduatedTopics:{},readStories:{},studyDates:{}};
  save(); render(); toast('초기화했어요');
}

/* ============================================================
   라우터
   ============================================================ */
function setTab(t){
  tab = t;
  document.querySelectorAll('#tabbar button').forEach(b=>b.classList.toggle('active', b.dataset.tab===t));
  render();
}
function render(){
  const map = {home:renderHome, explore:renderExplore, drill:renderDrill, stories:renderStories, stats:renderStats};
  $('#screen').innerHTML = map[tab]();
  window.scrollTo(0,0);
  
  // 메인 탭 화면 전환 시 수식 렌더링 격발
  triggerMathRender($('#screen'));
}
document.querySelectorAll('#tabbar button').forEach(b=>b.addEventListener('click',()=>setTab(b.dataset.tab)));

async function init(){
  $('#screen').innerHTML = `<div style="padding:70px 0;text-align:center;color:var(--ink-faint);font-size:14px">불러오는 중…</div>`;
  try {
    await loadIndex();
    await Promise.all([ ensureLoaded([DEFAULT_TOPIC]), loadStoriesIndex() ]);   // 홈 카운트·이야기 목록
  } catch(e){
    $('#screen').innerHTML = `<div class="card" style="margin-top:40px">
      <b style="font-size:15px">콘텐츠를 불러오지 못했어요</b>
      <p style="font-size:13.5px;color:var(--ink-soft);margin-top:10px;line-height:1.7">이 앱은 <code>data</code> 폴더의 JSON을 불러옵니다. HTML 파일을 더블클릭해서 여는 방식(<code>file://</code>)은 브라우저 보안정책 때문에 막힙니다.<br><br>다음 중 하나로 열어주세요:</p>
      <ul style="font-size:13.5px;color:var(--ink-soft);line-height:1.9;margin:8px 0 0 18px">
        <li>폴더에서 <code>python -m http.server</code> 실행 후 <code>localhost:8000</code> 접속</li>
        <li>GitHub Pages 등 웹 호스팅에 올리기</li>
      </ul>
      <p style="font-size:12px;color:var(--ink-faint);margin-top:12px">오류: ${esc(String(e.message||e))}</p>
    </div>`;
    return;
  }
  render();
}
init();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
